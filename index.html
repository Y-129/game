<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>四渡赤水 · 军事指挥艺术巅峰 | 完整剧本互动体验</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto Serif SC:wght@400;600;700;900&family=Noto Sans SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: #1a0a05; }

        /* ========== 首页（双语） ========== */
        .home-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 20%, #6b2a18, #2a120a);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease;
        }
        .home-screen.hidden { opacity: 0; pointer-events: none; }
        .game-title {
            font-family: 'Noto Serif SC', serif; font-size: 4em; font-weight: 900;
            background: linear-gradient(135deg, #f5c68a, #d4a45a);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            letter-spacing: 12px; margin-bottom: 20px; text-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }
        .game-subtitle { font-size: 1.2em; color: #f5c68a; letter-spacing: 6px; margin-bottom: 60px; border-left: 2px solid #d4a45a; padding-left: 20px; }
        .home-buttons { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .enter-btn {
            padding: 14px 48px; font-size: 1.2em; font-weight: 700;
            background: linear-gradient(135deg, #c53a1a, #8b2e12); border: 2px solid #d4a45a;
            border-radius: 50px; color: #fff; cursor: pointer; transition: 0.25s;
            letter-spacing: 4px; box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        }
        .enter-btn:hover { transform: translateY(-3px); background: #e05a2a; }

        /* ========== 主游戏左右分栏 ========== */
        .game-container {
            width: 100%; height: 100%; display: none;
            background: #1a0a05;
        }
        .game-container.active { display: flex; }

        /* 左侧地图区 - 更暖的红褐色 */
        .map-panel {
            width: 45%; height: 100%;
            background: #2e170e; border-right: 3px solid #e5b85b;
            display: flex; flex-direction: column; padding: 20px;
        }
        .map-title {
            font-family: 'Noto Serif SC', serif; font-size: 1.3em; font-weight: 700;
            color: #f5d792; text-align: center; padding-bottom: 12px;
            border-bottom: 2px solid #e5b85b; margin-bottom: 15px; letter-spacing: 4px;
        }
        .map-container {
            flex: 1; position: relative;
            background-image: url('https://raw.githubusercontent.com/Y-129/game/main/sidu_map.png');
            background-size: cover; background-position: center;
            border-radius: 12px; border: 2px solid #e5b85b; overflow: hidden;
            background-color: #2e170e;
        }
        .red-army-dot {
            position: absolute; width: 22px; height: 22px;
            background: radial-gradient(circle, #ff6644, #c53a1a);
            border-radius: 50%; border: 2px solid #ffd966;
            transform: translate(-50%, -50%); z-index: 20;
            transition: left 0.6s ease, top 0.6s ease;
            box-shadow: 0 0 15px rgba(255, 60, 0, 0.7);
        }
        .path-svg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 15;
        }
        .path-line {
            fill: none; stroke: #f5b87a; stroke-width: 3;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            stroke-linecap: round; transition: stroke-dashoffset 1.2s ease;
        }
        .path-line.animate { stroke-dashoffset: 0; }

        /* 右侧剧情区 - 深红褐渐变 */
        .story-panel {
            width: 55%; height: 100%;
            background: linear-gradient(145deg, #2a150e, #1f0f08);
            display: flex; flex-direction: column; padding: 20px;
        }
        .top-bar {
            display: flex; justify-content: space-between; padding-bottom: 12px;
            border-bottom: 2px solid #e5b85b; margin-bottom: 18px; flex-shrink: 0;
        }
        .chapter-info .chapter-number { font-size: 0.85em; color: #f5c68a; letter-spacing: 2px; }
        .chapter-info .chapter-title { font-size: 1.2em; font-weight: 600; color: #ffd966; margin-top: 4px; }
        .stats-display { display: flex; gap: 18px; }
        .stat-item {
            background: #3a1e12; padding: 6px 15px; border-radius: 40px;
            border: 1px solid #e5b85b; text-align: center;
        }
        .stat-label { font-size: 0.7rem; color: #f5c68a; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #ffd9a5; }
        .stat-troops { color: #ff8866; }
        .stat-supply { color: #ffcc66; }
        .stat-morale { color: #ffaa55; }

        .dialogue-area {
            flex: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 16px;
        }
        .speaker-name {
            font-size: 1.1em; font-weight: bold; color: #ffdd99;
            background: #8b3a1a; display: inline-block; padding: 4px 20px;
            border-radius: 40px; margin-bottom: 12px; width: fit-content;
        }
        .dialogue-box {
            background: #f7c56e; border: 2px solid #e5b85b;
            border-radius: 20px; padding: 22px;
            flex: 1; overflow-y: auto;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.3);
        }
        .story-text {
            color: #2c1a0c; font-size: 1rem; line-height: 1.8;
            font-family: 'Noto Serif SC', monospace; white-space: pre-wrap;
        }
        .button-bar {
            display: flex; gap: 15px; margin-top: 12px;
            justify-content: flex-start;
        }
        .skip-btn {
            background: #a54422; color: white; border: none;
            padding: 6px 18px; border-radius: 40px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .skip-btn:hover { background: #c45a1a; }
        .continue-hint {
            background: #c45a1a; color: white; padding: 6px 20px;
            border-radius: 40px; cursor: pointer; display: inline-block;
            font-weight: bold; text-align: center;
        }
        .choices-area {
            display: flex; flex-wrap: wrap; gap: 14px;
            margin-top: 8px; max-height: 200px; overflow-y: auto;
        }
        .choice-btn {
            background: #ffd966; border: 2px solid #b47c2e;
            color: #000000; padding: 12px 22px; font-size: 0.9rem;
            font-weight: bold; border-radius: 48px; cursor: pointer;
            transition: 0.2s; text-align: center; flex: 1 0 auto;
        }
        .choice-btn:hover { background: #ffc107; transform: translateY(-2px); }
        .bottom-controls {
            display: flex; justify-content: space-between; margin-top: 16px;
            padding-top: 12px; border-top: 1px solid #e5b85b;
        }
        .lang-switch-btn, .bgm-btn {
            background: #5a2e1a; border: 1px solid #e5b85b;
            color: #ffdd99; padding: 6px 18px; border-radius: 40px;
            cursor: pointer; font-weight: bold; margin-left: 8px;
        }
        .ending-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0a05e6; z-index: 2000; display: none;
            justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(8px);
        }
        @media (max-width: 900px) {
            .map-panel { width: 40%; } .story-panel { width: 60%; }
            .game-title { font-size: 2.5em; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

<!-- 首页 -->
<div class="home-screen" id="homeScreen">
    <div class="game-title">四渡赤水</div>
    <div class="game-subtitle">军事指挥艺术巅峰</div>
    <div class="home-buttons">
        <button class="enter-btn" data-lang="cn">🇨🇳 中文进入游戏</button>
        <button class="enter-btn" data-lang="en">🇺🇸 English Enter Game</button>
    </div>
</div>

<!-- 主游戏 -->
<div class="game-container" id="gameContainer">
    <div class="map-panel">
        <div class="map-title" id="mapTitle">战役态势图</div>
        <div class="map-container" id="mapContainer">
            <svg class="path-svg" id="pathSvg"><path id="pathLine" class="path-line" d="" /></svg>
            <div class="red-army-dot" id="redArmyDot"></div>
        </div>
    </div>
    <div class="story-panel">
        <div class="top-bar">
            <div class="chapter-info"><div class="chapter-number" id="chapterNumber">序章</div><div class="chapter-title" id="chapterTitle">遵义会议</div></div>
            <div class="stats-display">
                <div class="stat-item"><div class="stat-label" id="labelTroops">剩余兵力</div><div class="stat-value stat-troops" id="troopsValue">37,000</div></div>
                <div class="stat-item"><div class="stat-label" id="labelSupply">补给</div><div class="stat-value stat-supply" id="supplyValue">100</div></div>
                <div class="stat-item"><div class="stat-label" id="labelMorale">士气</div><div class="stat-value stat-morale" id="moraleValue">100</div></div>
            </div>
        </div>
        <div class="dialogue-area">
            <div class="speaker-name" id="speakerName">旁白</div>
            <div class="dialogue-box"><div class="story-text" id="storyText">加载战役档案……</div></div>
            <div class="button-bar">
                <button class="skip-btn" id="skipBtn">⏩ 跳过动画</button>
                <div class="continue-hint" id="continueHint" style="display:none;">继续 ▶</div>
            </div>
        </div>
        <div class="choices-area" id="choicesContainer"></div>
        <div class="bottom-controls">
            <button class="lang-switch-btn" id="langSwitchBtn">🌐 中文 / EN</button>
            <button class="bgm-btn" id="bgmToggleBtn">🎵 背景乐</button>
        </div>
    </div>
</div>
<div class="ending-screen" id="endingScreen"></div>
<audio id="bgMusic" loop><source src="https://raw.githubusercontent.com/Y-129/game/main/changzheng_xinnian.mp3"></audio>

<script>
    // ======================= 完整剧本数据（基于剧本节点(2).docx） =======================
    const storyNodes = {
        // 节点0：遵义会议（完整）
        "start": {
            textCn: "1935年1月，贵州遵义。湘江一役，中央红军从8.6万人锐减至3万余人，鲜血染红了江水。博古、李德的\"左\"倾教条主义领导已把红军带到了悬崖边上，第五次反\"围剿\"失败的惨痛教训让每一个红军指挥员都感到切肤之痛。通道会议、黎平会议、猴场会议上一路争论不休，如今，利用这宝贵的休整间隙，中共中央政治局扩大会议——遵义会议——终于在这座黔北小城的柏辉章公馆二楼上召开了。一场严肃而深刻的路线之争，即将完全摆到桌面上来。\n\n会议进入第二天，博古的主报告刚为自己辩护完毕，张闻天的\"反报告\"直指要害，周恩来的副报告实事求是地承认了错误。就在这时，你——毛泽东——站了起来。你一反往日的沉默，“我来说几句。”整个会场安静下来。你点名批评了博古、李德，指责他们无视红军打运动战的传统策略：“路是要用脚走的，人是要吃饭的。只知道纸上谈兵，不考虑战士要走路，也要吃饭，也要睡觉；也不问走的是山地、平原还是河道，只知道在地图上一画，限定时间打，当然打不好。”\n\n你逐条剖析第五次反“围剿”失败的真正原因：第一阶段进攻中的冒险主义，第二阶段防御中的保守主义，第三阶段退却中的逃跑主义。前四次反“围剿”敌人哪一次不比我们多几倍？为什么偏偏第五次打了败仗？这归根到底是军事策略和指挥的问题！你尖锐地批评李德“包办了军事委员会的一切工作”、“把军委的集体领导完全取消”——这是教条主义在指挥红军走向绝路。\n\n这番话掷地有声，像一把刀剥开了层层迷雾。\n\n凯丰却突然站起来发难，大声说道：“毛泽东打仗的方法一点都不高明，就是照着《三国演义》和《孙子兵法》打仗的！”\n\n你毫不退让，反唇相讥：“你没读过《孙子兵法》怎么知道我的战术是从那里来的？打仗之事，敌我形势那么紧张，怎能照书本去打！”\n\n素来谦逊稳重的朱德，这次也声色俱厉地站了起来，大声质问李德：“有什么本钱，就打什么仗，没有本钱，打什么仗？”顿了顿，全场听到了一句沉重至极的话：“如果继续这样的领导，我们就不能再跟着走下去！”\n\n全场陷入了短暂的沉默。\n\n王稼祥在躺椅里抬起身体，一只手按着腹部的伤口，坚定地说：“我同意毛泽东的发言。我们不能再这样指挥下去了，必须改变错误的领导。”他的明确表态如同一颗重磅炸弹。\n\n这时周恩来站了出来，一字一句地说：“只有改变错误的领导，红军才有希望，革命才能成功。”他言辞恳切地请求中央撤销他的职务，由能正确指挥作战的人来接替——他全力推举了你。\n\n博古被四面八方的批评压得面红耳赤，无奈地喃喃道：“我要考虑考虑。”\n\n李德远远地坐在门旁，一根接一根地抽烟，一言不发。\n\n会议持续到第三天。终于，决议形成了。会议决定清晰有力：你进入了政治局常委，取消了“三人团”，周恩来、朱德负责军事指挥。\n\n走出柏公馆，已是深夜。黔北的夜空罕见地清明。周恩来跟在你身后停下了脚步：“毛主席，这个会……终于开完了。”\n\n你深深吸了一口冷冽的寒气，没有回头，望着远处的山峦轮廓：“还没有。真正的仗还在赤水河边上等着我们呢。”\n\n话音未落，历史的镜头从柏公馆的烛火前缓缓拉开，越过黔北的群山，落在赤水河畔。你睁开眼——已经站在了指挥部里，看着地图上密密麻麻的敌军标记，听着窗外隐约传来的风声与远处的零星枪响。三万将士的目光，都落在你身上。\n\n接下来，你将以这片山川为棋盘，以赤水为线，带领部队在绝境中周旋、机动、突围。你的目光所及，就是革命前行的方向；你的每一次决断，都写着数万将士的生死。\n\n眼前，战局已铺开；身后，再无退路！",
            textEn: "January 1935, Zunyi, Guizhou. After the Xiangjiang River battle, the Central Red Army had been reduced from 86,000 to just over 30,000...",
            speaker: "旁白", emotion: "solemn", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 },
            choices: [{ textCn: "进入指挥部", textEn: "Enter Command", next: "node1" }]
        },
        "node1": { textCn: "天刚蒙蒙亮，青杠坡的山头上雾气还没散。你站在指挥所前，手里的望远镜死死盯着前方。枪炮声像炒豆子一样密集，震得耳朵嗡嗡响。\n\n这时，通讯员踉跄着撞进指挥所，枪套在腰间哐当乱响，话还没出口，先弯着腰剧烈咳嗽起来，喉管里像堵着沙：“指挥！情况不对！原说川军郭勋祺4个团，实际还有潘佐、廖泽部，总兵力超万人，还在增兵！”\n\n还没等你回话，前线又传来急报：“红五军团阵地吃紧！川军仗着武器好，正疯狂反扑，前锋已经快打到白马山了！朱德总司令已经去前线督战了！”\n\n就在这时，通讯员送来一份截获的敌情通报，你攥着望远镜的指节瞬间泛白，望远镜“当啷”一声磕在壕沟壁上，手背上的青筋突突直跳——原来军委二局的参谋在抄报时，把“旅”字错看成了“团”字，一字之差，导致我们对敌情判断出现了严重失误！\n\n【指挥员，请立刻决判】", textEn: "Dawn at Qinggangpo... The enemy strength far exceeds estimates.", speaker: "军委急电", emotion: "tense", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "A. 增兵死磕，拿下土城", textEn: "A. Reinforce", next: "node1A" }, { textCn: "B. 果断撤退，一渡赤水", textEn: "B. Retreat & cross", next: "node1B" }, { textCn: "C. 分兵迂回，侧翼突袭", textEn: "C. Flank attack", next: "node1C" }] },
        "node1A": { textCn: "强攻土城陷入苦战，干部团伤亡惨重，被迫溃退。", textEn: "Heavy losses, forced retreat.", speaker: "战况", emotion: "tragic", changes: { troops: -3000, supply: -40, morale: -50, casualties: 3000 }, choices: [{ textCn: "继续", textEn: "Continue", next: "node1B" }] },
        "node1B": { textCn: "你果断下令撤退，红军主力连夜渡过赤水河，避开敌军主力，保存了有生力量。\n\n红军成功跳出包围圈，进入川南，一场与敌军周旋的机动战，刚刚开始。", textEn: "Successful retreat and first crossing.", speaker: "军委", emotion: "determined", changes: { troops: -2000, supply: -10, morale: -10, casualties: 2000 }, choices: [{ textCn: "进入下一阶段", textEn: "Next", next: "branch_yangyong" }] },
        "node1C": { textCn: "分兵突袭遭反包围，部队指挥体系混乱，建制彻底溃散。", textEn: "Disastrous flank attack.", speaker: "战况", emotion: "tragic", changes: { troops: -5000, supply: -30, morale: -100, casualties: 5000 }, choices: [{ textCn: "查看结局", textEn: "End", next: "ending_total_loss" }] },
        "branch_yangyong": { textCn: "【支线：杨勇的故事】\n\n21岁的杨勇，在土城青杠坡的阵地上，经历了他长征路上最惨烈的一战。\n\n你是否想了解，此刻他的命运？", textEn: "Side story: Yang Yong.", speaker: "旁白", emotion: "solemn", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "进入杨勇的故事", textEn: "Enter", next: "yangyong_story" }, { textCn: "跳过，继续主线", textEn: "Skip", next: "node2" }] },
        "yangyong_story": { textCn: "【杨勇·断后】\n\n激战中，一发子弹击中他的右腮，从嘴唇穿出，六颗牙齿被打落，鲜血瞬间染红了军装。身负重伤，他仍然不下火线。说不了话，他就用笔来写作战命令，直到失血过多，昏倒在阵地上。\n\n多年后，当战友问他当时疼不疼，他只是笑着说：“疼哪顾得上，只想着多杀几个敌人，给主力争取时间。”", textEn: "Yang Yong wounded but kept fighting.", speaker: "杨勇", emotion: "tragic", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "回到主线", textEn: "Return", next: "node2" }] },
        "node2": { textCn: "冬夜湿冷，赤水河畔寒风呼啸。传令兵汇报敌军正在包抄后路。红五军团指挥官请求立刻定下突围方向。\n\n【指挥员，请立即决断】", textEn: "Night decision after first crossing.", speaker: "前线指挥官", emotion: "tense", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "A. 集中兵力正面强攻", textEn: "A. Frontal assault", next: "node2A" }, { textCn: "B. 架设浮桥，全军西渡赤水", textEn: "B. Cross westward", next: "node2B" }, { textCn: "C. 向南迂回", textEn: "C. South detour", next: "node2C" }] },
        "node2A": { textCn: "正面强攻未能撕开缺口，被迫转向渡河。", textEn: "Failed frontal assault, forced to cross.", speaker: "战况", emotion: "tragic", changes: { troops: -6500, supply: -25, morale: -30, casualties: 6500 }, choices: [{ textCn: "继续", textEn: "Continue", next: "node1B" }] },
        "node2B": { textCn: "周恩来连夜指挥工兵架设浮桥，董振堂率红五军团死守。1月29日拂晓全军有序西渡赤水，成功突围。", textEn: "Successful crossing.", speaker: "军委", emotion: "determined", changes: { troops: -280, supply: 10, morale: 25, casualties: 280 }, choices: [{ textCn: "进入下一阶段", textEn: "Next", next: "node3" }] },
        "node2C": { textCn: "南岸山地行军缓慢，敌军提前布防，遭遇袭扰大量减员。", textEn: "Detour fails.", speaker: "战况", emotion: "tragic", changes: { troops: -5200, supply: -20, morale: -22, casualties: 5200 }, choices: [{ textCn: "继续", textEn: "Continue", next: "node1B" }] },
        "node3": { textCn: "扎西整编：部队臃肿，重装备拖累。军委下达缩编命令。你怎么办？", textEn: "Zhaxi reorganization.", speaker: "军委", emotion: "solemn", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "A. 维持现状", textEn: "A. Keep status quo", next: "node3A" }, { textCn: "B. 精简缩编，轻装整编", textEn: "B. Streamline", next: "node3B" }, { textCn: "C. 扩充机关", textEn: "C. Expand headquarters", next: "node3C" }] },
        "node3A": { textCn: "部队臃肿，敌军合围，伤亡惨重。", textEn: "Bloated army suffers.", speaker: "战况", emotion: "tragic", changes: { troops: -4800, supply: -25, morale: -28, casualties: 4800 }, choices: [{ textCn: "继续", textEn: "Continue", next: "branch_hezizhen" }] },
        "node3B": { textCn: "5天内完成整编，30个团缩为17个，轻装灵活，战力提升。", textEn: "Successful streamlining.", speaker: "军委", emotion: "determined", changes: { troops: -1200, supply: 20, morale: 30, casualties: 1200 }, choices: [{ textCn: "进入下一阶段", textEn: "Next", next: "branch_hezizhen" }] },
        "node3C": { textCn: "机关臃肿，重装备拖累，敌军围堵加剧。", textEn: "Worse bloat.", speaker: "战况", emotion: "tragic", changes: { troops: -5500, supply: -30, morale: -32, casualties: 5500 }, choices: [{ textCn: "继续", textEn: "Continue", next: "branch_hezizhen" }] },
        "branch_hezizhen": { textCn: "【支线：贺子珍产子】\n\n1935年2月，贺子珍在古蔺白沙场附近临产。产后第二天即随军开拔，孩子托付给老乡。", textEn: "He Zizhen gives birth.", speaker: "旁白", emotion: "tender", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "继续主线", textEn: "Continue", next: "node4" }] },
        "node4": { textCn: "二渡赤水：回师东返，从太平渡、二郎滩二渡赤水，击溃黔军，兵锋直指娄山关。", textEn: "Second crossing.", speaker: "军委", emotion: "determined", changes: { troops: -30, supply: 15, morale: 20, casualties: 30 }, choices: [{ textCn: "攻打娄山关", textEn: "Attack Loushan", next: "node5" }] },
        "node5": { textCn: "娄山关地势险要，点金山制高点被敌占据。侦察兵请示如何进攻。", textEn: "Loushan Pass dilemma.", speaker: "侦察兵", emotion: "tense", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "A. 正面强攻", textEn: "A. Frontal", next: "node5A" }, { textCn: "B. 侧翼奇袭点金山", textEn: "B. Flank attack", next: "node5B" }, { textCn: "C. 暂缓进攻", textEn: "C. Delay", next: "node5C" }] },
        "node5A": { textCn: "正面强攻，伤亡惨重。", textEn: "Frontal assault fails.", speaker: "战况", emotion: "tragic", changes: { troops: -3500, supply: -20, morale: -30, casualties: 3500 }, choices: [{ textCn: "调整战术", textEn: "Adjust", next: "branch_zengxisheng" }] },
        "node5B": { textCn: "红十三团正面牵制，突击队攀悬崖奇袭点金山，26日攻克娄山关，缴获大量武器。", textEn: "Victory at Loushan.", speaker: "战报", emotion: "victory", changes: { troops: -100, supply: 25, morale: 30, casualties: 100 }, choices: [{ textCn: "乘胜追击，收复遵义", textEn: "Pursue to Zunyi", next: "branch_zengxisheng" }] },
        "node5C": { textCn: "敌军援军抵达，错失良机。", textEn: "Missed opportunity.", speaker: "旁白", emotion: "tense", changes: { troops: -1200, supply: -20, morale: -20, casualties: 1200 }, choices: [{ textCn: "继续进攻", textEn: "Attack", next: "branch_zengxisheng" }] },
        "branch_zengxisheng": { textCn: "【支线：曾希圣·情报逆转乾坤】曾希圣截获密电：吴奇伟司令部空虚，立即上报，红军直扑忠庄铺，吴奇伟全线崩溃。", textEn: "Zeng Xisheng's intelligence saved the army.", speaker: "旁白", emotion: "tense", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "致敬无名英雄，继续主线", textEn: "Continue", next: "node6" }] },
        "node6": { textCn: "遵义大捷后，蒋介石重兵合围。你面临抉择。", textEn: "Great victory at Zunyi, but Chiang regroups.", speaker: "军委", emotion: "victory", changes: { troops: -200, supply: 20, morale: 30, casualties: 200 }, choices: [{ textCn: "A. 围攻鲁班场", textEn: "A. Attack Luban", next: "node6A" }, { textCn: "B. 三渡赤水佯动", textEn: "B. Third crossing decoy", next: "node6B" }, { textCn: "C. 固守遵义", textEn: "C. Defend Zunyi", next: "node6C" }] },
        "node6A": { textCn: "强攻鲁班场失败，被迫撤离。", textEn: "Attack on Luban fails.", speaker: "战况", emotion: "tragic", changes: { troops: -800, supply: -25, morale: -30, casualties: 800 }, choices: [{ textCn: "继续", textEn: "Continue", next: "node7" }] },
        "node6B": { textCn: "三渡赤水佯动，蒋介石中计，红军成功跳出包围圈。", textEn: "Third crossing decoy works.", speaker: "军委", emotion: "determined", changes: { troops: -100, supply: -10, morale: 40, casualties: 100 }, choices: [{ textCn: "进入下一阶段", textEn: "Next", next: "branch_maotai" }] },
        "node6C": { textCn: "固守遵义，陷入重围，伤亡惨重。", textEn: "Defending Zunyi leads to disaster.", speaker: "战况", emotion: "tragic", changes: { troops: -900, supply: -35, morale: -45, casualties: 900 }, choices: [{ textCn: "查看结局", textEn: "End", next: "ending_bad_decision" }] },
        "branch_maotai": { textCn: "【支线：茅台镇的酒香】红军抵达茅台镇，伤员急需酒精消毒。你怎么办？", textEn: "Maotai wine dilemma.", speaker: "旁白", emotion: "solemn", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "征用酒消毒，给足银圆", textEn: "Buy wine", next: "maotai_A" }, { textCn: "不扰民，另想办法", textEn: "Find another way", next: "maotai_B" }, { textCn: "用酒消毒且饮用", textEn: "Use and drink", next: "maotai_C" }] },
        "maotai_A": { textCn: "按价买酒消毒，百姓感动，军民鱼水情。", textEn: "Maotai saves the wounded.", speaker: "旁白", emotion: "victory", changes: { troops: 0, supply: 15, morale: 20, casualties: 0 }, choices: [{ textCn: "回到主线", textEn: "Return", next: "node7" }] },
        "maotai_B": { textCn: "不扰民，但缺消毒品，伤员感染。", textEn: "Discipline costs lives.", speaker: "旁白", emotion: "solemn", changes: { troops: -200, supply: 0, morale: -5, casualties: 200 }, choices: [{ textCn: "回到主线", textEn: "Return", next: "node7" }] },
        "maotai_C": { textCn: "战士们醉酒，敌军夜袭，造成伤亡。", textEn: "Good intentions backfire.", speaker: "旁白", emotion: "tragic", changes: { troops: -300, supply: 0, morale: -10, casualties: 300 }, choices: [{ textCn: "回到主线", textEn: "Return", next: "node7" }] },
        "node7": { textCn: "三渡赤水佯动后，主力秘密折返，四渡赤水，跳出包围圈，巧渡金沙江，取得伟大胜利！", textEn: "Fourth crossing succeeds, great victory.", speaker: "军委", emotion: "victory", changes: { troops: -50, supply: -15, morale: 50, casualties: 50 }, choices: [{ textCn: "查看最终结局", textEn: "View Victory", next: "final_victory" }] },
        "final_victory": { textCn: "【四渡赤水·伟大胜利】从1月29日到5月9日，三个半月，赤水河上来回四趟。这是战争史上的奇迹，是毛泽东军事指挥艺术的巅峰！", textEn: "The miracle of four crossings.", speaker: "旁白", emotion: "victory", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [], isEnding: true },
        "ending_total_loss": { textCn: "三万将士血染赤水河畔。请重新体验。", textEn: "Total loss. Try again.", speaker: "旁白", emotion: "tragic", changes: { troops: -30000, supply: -100, morale: -100, casualties: 30000 }, choices: [{ textCn: "重新开始", textEn: "Restart", next: "start" }], isEnding: true },
        "ending_bad_decision": { textCn: "历史不容有失。请重新推演。", textEn: "Bad ending. Restart.", speaker: "旁白", emotion: "solemn", changes: { troops: 0, supply: 0, morale: 0, casualties: 0 }, choices: [{ textCn: "重新开始", textEn: "Restart", next: "start" }], isEnding: true }
    };
    // 补充英文版（简化但保留功能）
    for (let key in storyNodes) {
        let node = storyNodes[key];
        if (!node.textEn && node.textCn) node.textEn = node.textCn.slice(0, 200) + "...";
        if (node.choices) node.choices.forEach(c => { if (!c.textEn) c.textEn = c.textCn; });
    }

    // ---------- 游戏核心 ----------
    let totalCasualties = 0;
    let currentLang = "cn";
    let currentNodeId = "start";
    let visitedPath = [];
    let gameStats = { troops: 37000, supply: 100, morale: 100 };
    let typingInterval = null;
    let currentTypingCallback = null;
    let currentFullText = "";
    let currentEmotion = "solemn";
    let isTypingActive = false;

    // 地图坐标
    const posMap = {
        start: { x: 52, y: 32 }, node1: { x: 28, y: 52 }, node1B: { x: 24, y: 58 }, node2: { x: 18, y: 44 },
        node3: { x: 34, y: 62 }, node4: { x: 52, y: 22 }, node5: { x: 56, y: 35 }, node6: { x: 38, y: 68 },
        node7: { x: 42, y: 60 }, final_victory: { x: 72, y: 48 }
    };
    function getPos(id) { return posMap[id] || posMap.start; }
    function updateMap() {
        let pos = getPos(currentNodeId);
        let dot = document.getElementById('redArmyDot');
        if (dot) { dot.style.left = pos.x + '%'; dot.style.top = pos.y + '%'; dot.style.display = 'block'; }
        if (visitedPath.length >= 2) {
            let last = visitedPath[visitedPath.length-2], cur = visitedPath[visitedPath.length-1];
            let p1 = getPos(last), p2 = getPos(cur);
            let pathLine = document.getElementById('pathLine');
            pathLine.setAttribute('d', `M ${p1.x}% ${p1.y}% L ${p2.x}% ${p2.y}%`);
            pathLine.classList.remove('animate');
            setTimeout(() => pathLine.classList.add('animate'), 30);
        }
    }

    function updateStatsUI() {
        document.getElementById('troopsValue').innerText = gameStats.troops.toLocaleString();
        document.getElementById('supplyValue').innerText = gameStats.supply;
        document.getElementById('moraleValue').innerText = gameStats.morale;
    }
    function applyChanges(node) {
        if (node.changes) {
            gameStats.troops = Math.max(0, gameStats.troops + (node.changes.troops || 0));
            gameStats.supply = Math.max(0, Math.min(100, gameStats.supply + (node.changes.supply || 0)));
            gameStats.morale = Math.max(0, Math.min(100, gameStats.morale + (node.changes.morale || 0)));
            totalCasualties += (node.changes.casualties || 0);
            updateStatsUI();
        }
    }

    // 情感朗读
    function speakRich(text, emotion) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        let utter = new SpeechSynthesisUtterance(text);
        utter.lang = currentLang === 'cn' ? 'zh-CN' : 'en-US';
        let rates = { solemn: 0.82, tense: 1.0, tragic: 0.75, determined: 0.9, victory: 0.95, tender: 0.78 };
        utter.rate = rates[emotion] || 0.9;
        window.speechSynthesis.speak(utter);
    }

    // 跳过动画：停止打字，显示全文，停止朗读，然后调用完成回调
    function skipTyping() {
        if (typingInterval) {
            clearInterval(typingInterval);
            typingInterval = null;
        }
        if (isTypingActive) {
            document.getElementById('storyText').innerHTML = currentFullText;
            isTypingActive = false;
            // 停止当前朗读
            window.speechSynthesis.cancel();
            // 执行完成后的回调（显示选项或继续）
            if (currentTypingCallback) {
                let cb = currentTypingCallback;
                currentTypingCallback = null;
                cb();
            }
        }
    }

    function typeWriter(text, callback) {
        if (typingInterval) clearInterval(typingInterval);
        let storyDiv = document.getElementById('storyText');
        storyDiv.innerHTML = "";
        let idx = 0;
        isTypingActive = true;
        currentFullText = text;
        currentTypingCallback = callback;
        typingInterval = setInterval(() => {
            if (idx < text.length) {
                storyDiv.innerHTML += text[idx];
                idx++;
            } else {
                clearInterval(typingInterval);
                typingInterval = null;
                isTypingActive = false;
                if (callback) callback();
                document.getElementById('continueHint').style.display = 'block';
            }
        }, 30);
    }

    function showChoices(choices) {
        let container = document.getElementById('choicesContainer'); container.innerHTML = "";
        choices.forEach(ch => {
            let btn = document.createElement('button'); btn.className = 'choice-btn';
            btn.innerText = currentLang === 'cn' ? ch.textCn : ch.textEn;
            btn.onclick = () => goToScene(ch.next);
            container.appendChild(btn);
        });
    }

    function goToScene(sceneId) {
        if (typingInterval) clearInterval(typingInterval);
        let scene = storyNodes[sceneId];
        if (!scene) return;
        currentNodeId = sceneId;
        if (!visitedPath.includes(sceneId)) visitedPath.push(sceneId);
        applyChanges(scene);
        updateMap();
        document.getElementById('speakerName').innerHTML = scene.speaker || "指挥员";
        let fullText = currentLang === 'cn' ? scene.textCn : scene.textEn;
        currentEmotion = scene.emotion;
        // 重置继续按钮状态
        document.getElementById('continueHint').style.display = 'none';
        document.getElementById('choicesContainer').innerHTML = "";
        typeWriter(fullText, () => {
            // 打字完成后的回调
            if (scene.choices && scene.choices.length) {
                // 如果只有一个选项且是“继续”类，也可以直接显示选项，但这里保留继续按钮逻辑
                if (scene.choices.length === 1 && scene.choices[0].textCn.includes("继续")) {
                    document.getElementById('continueHint').style.display = 'block';
                    document.getElementById('continueHint').onclick = () => {
                        document.getElementById('continueHint').style.display = 'none';
                        showChoices(scene.choices);
                    };
                } else {
                    showChoices(scene.choices);
                }
            } else if (scene.isEnding) {
                showEnding(scene);
            } else {
                // 没有选项且非结局，可能是单一路径，显示继续按钮
                document.getElementById('continueHint').style.display = 'block';
                document.getElementById('continueHint').onclick = () => {
                    // 理论上这种场景应该只有一个next，但我们的数据中没有这种情况，保留安全
                    if (scene.choices && scene.choices.length === 1) {
                        goToScene(scene.choices[0].next);
                    } else {
                        // 如果没有选项也不是结局，可能数据问题，重新开始
                        console.warn("No valid transition");
                    }
                };
            }
            // 自动朗读（仅在非跳过情况下，打字完成后朗读）
            speakRich(fullText, scene.emotion);
        });
        // 绑定跳过按钮事件（每次都重新绑定确保有效）
        document.getElementById('skipBtn').onclick = () => { skipTyping(); };
    }

    function showEnding(scene) {
        let endingDiv = document.getElementById('endingScreen');
        endingDiv.style.display = 'flex';
        let grade = totalCasualties < 2000 ? "卓越统帅" : (totalCasualties < 5000 ? "优秀指挥" : "勉强度过");
        endingDiv.innerHTML = `<div style="background:#2b1c0e; padding:40px; border-radius:30px; text-align:center; max-width:600px;"><h2 style="color:#ffb347">${grade}</h2><p style="color:#f5e2c0; margin:20px;">${currentLang === 'cn' ? scene.textCn : scene.textEn}<br><br>累计伤亡：${totalCasualties}人</p><button id="restartBtn" style="background:#d48c3a; padding:10px 30px; border-radius:40px; border:none; cursor:pointer;">${currentLang === 'cn' ? '重新指挥' : 'Restart'}</button></div>`;
        document.getElementById('restartBtn')?.addEventListener('click', () => { location.reload(); });
    }

    function updateLanguage() {
        let t = currentLang === 'cn' ? { labelTroops:"剩余兵力", labelSupply:"补给", labelMorale:"士气", mapTitle:"战役态势图" } : { labelTroops:"Troops", labelSupply:"Supply", labelMorale:"Morale", mapTitle:"Battle Map" };
        document.getElementById('labelTroops').innerText = t.labelTroops;
        document.getElementById('labelSupply').innerText = t.labelSupply;
        document.getElementById('labelMorale').innerText = t.labelMorale;
        document.getElementById('mapTitle').innerText = t.mapTitle;
        if (currentNodeId && storyNodes[currentNodeId]) goToScene(currentNodeId);
    }
    document.getElementById('langSwitchBtn')?.addEventListener('click', () => { currentLang = currentLang === 'cn' ? 'en' : 'cn'; updateLanguage(); });

    // 背景音乐
    let bgmPlaying = false, bgmAudio = document.getElementById('bgMusic');
    function toggleBGM() { if(bgmPlaying) { bgmAudio.pause(); bgmPlaying=false; document.getElementById('bgmToggleBtn').innerHTML='🎵 背景乐'; } else { bgmAudio.play().catch(e=>{}); bgmPlaying=true; document.getElementById('bgmToggleBtn').innerHTML='🔇 音乐开'; } }
    document.getElementById('bgmToggleBtn').onclick = toggleBGM;
    document.body.addEventListener('click', () => { if(!bgmPlaying && bgmAudio.paused) { bgmAudio.play().catch(()=>{}); bgmPlaying=true; document.getElementById('bgmToggleBtn').innerHTML='🔇 音乐开'; } }, { once: true });

    // 首页进入
    document.querySelectorAll('.enter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentLang = btn.getAttribute('data-lang');
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            updateLanguage();
            goToScene('start');
        });
    });
    updateStatsUI();
</script>
</body>
</html>
