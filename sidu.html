<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/game/">
  <title>四渡赤水 · Crossing the Chishui</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--red-dark:#8B0000;--red-army:#CC3333;--gold:#D4A843;--parchment:#F5E6C8;--parchment-dark:#E8D5A8;--ink:#2C1810;--ink-light:#5C4033;--river:#4A7C9B}
    body{font-family:'Noto Sans SC',sans-serif;background:#0a0a0a;color:var(--ink);overflow:hidden;height:100vh}

    /* ===== START SCREEN ===== */
    #start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:hidden}
    .start-bg{position:absolute;inset:0;background:url('https://www.coze.cn/s/Z_mnPZL_0Mw/') center/cover no-repeat;filter:brightness(0.25) saturate(0.6)}
    .start-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.7) 100%)}
    .start-content{position:relative;z-index:2;text-align:center}
    .start-title{font-family:'Noto Serif SC',serif;font-size:68px;font-weight:900;color:var(--gold);text-shadow:0 0 60px rgba(212,168,67,0.3),0 4px 12px rgba(0,0,0,0.9);letter-spacing:16px;margin-bottom:4px}
    .start-title-en{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:#c9a96e;letter-spacing:6px;margin-bottom:40px;opacity:0.7}
    .start-quote{max-width:550px;text-align:center;color:#e8d5a8;font-size:14px;line-height:2;margin-bottom:20px;opacity:0.6;font-family:'Noto Serif SC',serif}
    .start-quote-en{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;margin-bottom:40px;opacity:0.5;color:#c9a96e}
    .lang-switch{display:flex;gap:12px;margin-bottom:30px}
    .lang-btn{background:transparent;border:1px solid rgba(212,168,67,0.4);color:var(--gold);padding:8px 28px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC',serif;letter-spacing:3px;transition:all 0.3s;border-radius:3px}
    .lang-btn:hover,.lang-btn.active{background:rgba(212,168,67,0.15);border-color:var(--gold)}
    .start-btn{background:linear-gradient(135deg,var(--red-dark),var(--red-army));color:var(--gold);border:2px solid var(--gold);padding:16px 60px;font-size:20px;font-family:'Noto Serif SC',serif;letter-spacing:8px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
    .start-btn:hover{background:linear-gradient(135deg,#a00000,#dd4444);transform:scale(1.05);box-shadow:0 0 30px rgba(204,51,51,0.5)}
    #start-screen.fade-out{opacity:0;pointer-events:none;transition:opacity 0.8s}

    /* ===== GAME ===== */
    #game-container{display:none;height:100vh;flex-direction:column;background:url('https://www.coze.cn/s/gWREDyI12xo/') center/cover no-repeat fixed}
    #game-container.active{display:flex}

    .top-bar{background:linear-gradient(180deg,#1a0e06,#2C1810,#3d2415);color:var(--gold);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;font-family:'Noto Serif SC',serif;flex-shrink:0;border-bottom:2px solid rgba(212,168,67,0.6);min-height:50px}
    .chapter-title{font-size:16px;font-weight:700;letter-spacing:3px}
    .top-controls{display:flex;align-items:center;gap:16px}
    .audio-controls{display:flex;align-items:center;gap:8px}
    .audio-btn{background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.3);color:var(--gold);width:30px;height:30px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
    .audio-btn:hover{background:rgba(212,168,67,0.25)}
    .audio-btn.active{background:rgba(212,168,67,0.3);border-color:var(--gold)}
    .vol-slider{width:50px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(212,168,67,0.25);border-radius:2px;outline:none}
    .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--gold);border-radius:50%;cursor:pointer}
    .lang-mini{display:flex;gap:6px}
    .lang-mini-btn{background:transparent;border:1px solid rgba(212,168,67,0.3);color:var(--gold);padding:2px 10px;font-size:11px;cursor:pointer;border-radius:3px;transition:all 0.2s;font-weight:700}
    .lang-mini-btn.active{background:rgba(212,168,67,0.25);border-color:var(--gold)}
    .resources{display:flex;gap:18px;font-size:13px;align-items:center}
    .back-btn{background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.35);color:var(--gold);padding:3px 12px;font-size:11px;cursor:pointer;border-radius:4px;transition:all 0.2s;font-family:'Noto Serif SC',serif;letter-spacing:2px;display:none;white-space:nowrap}
    .back-btn:hover{background:rgba(212,168,67,0.25);border-color:var(--gold)}
    .back-btn.show{display:inline-flex;align-items:center;gap:4px}
    .resource-item{display:flex;align-items:center;gap:5px}
    .resource-icon{font-size:16px}
    .resource-value{font-weight:700;color:#fff}
    .resource-label{opacity:0.6;font-size:11px}

    .game-main{flex:1;display:flex;overflow:hidden;min-height:0}

    /* ===== MAP PANEL ===== */
    .map-panel{width:50%;position:relative;overflow:hidden;background:#2a2a2a}
    .map-base-img{width:100%;height:100%;object-fit:contain;display:block}
    .map-overlay{position:absolute;inset:0;pointer-events:none}
    .map-node{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;z-index:5;transition:all 0.4s ease}
    .map-node-dot{width:12px;height:12px;border-radius:50%;background:rgba(180,160,120,0.6);border:2px solid rgba(120,100,70,0.5);transition:all 0.4s}
    .map-node.active .map-node-dot{background:#CC3333;border-color:#ffdd44;box-shadow:0 0 12px rgba(204,51,51,0.7),0 0 24px rgba(204,51,51,0.3);width:16px;height:16px;animation:nodePulse 1.5s infinite}
    .map-node.visited .map-node-dot{background:var(--gold);border-color:#c49a30;box-shadow:0 0 8px rgba(212,168,67,0.4)}
    .map-node.current .map-node-dot{background:#CC3333;border-color:#ffdd44;box-shadow:0 0 16px rgba(204,51,51,0.8),0 0 32px rgba(204,51,51,0.4);width:18px;height:18px;animation:nodePulse 1s infinite}
    @keyframes nodePulse{0%,100%{transform:scale(1);box-shadow:0 0 12px rgba(204,51,51,0.7)}50%{transform:scale(1.3);box-shadow:0 0 24px rgba(204,51,51,0.9)}}
    .map-node-label{display:none}
    .map-routes{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
    .map-routes line{stroke:rgba(204,51,51,0.15);stroke-width:2;transition:all 0.6s}
    .map-routes line.traversed{stroke:rgba(204,51,51,0.7);stroke-width:3;filter:drop-shadow(0 0 4px rgba(204,51,51,0.5))}
    .map-routes line.active{stroke:#CC3333;stroke-width:3;stroke-dasharray:6 4;animation:routeDash 0.8s linear infinite;filter:drop-shadow(0 0 6px rgba(204,51,51,0.6))}
    @keyframes routeDash{to{stroke-dashoffset:-10}}
    .map-node-badge{display:none}
    .map-army{position:absolute;transform:translate(-50%,-50%);z-index:10;transition:all 1.2s cubic-bezier(0.25,0.46,0.45,0.94)}
    .map-army-star{width:28px;height:28px;position:relative;filter:drop-shadow(0 0 8px rgba(204,51,51,0.6))}
    .map-army-star::before{content:'★';font-size:28px;color:#CC3333;text-shadow:0 0 8px rgba(204,51,51,0.5);animation:armyGlow 2s infinite}
    @keyframes armyGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(204,51,51,0.6))}50%{filter:drop-shadow(0 0 14px rgba(204,51,51,0.9))}}
    .crossing-indicator{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.8);color:var(--gold);padding:6px 14px;border-radius:4px;font-size:13px;font-family:'Noto Serif SC',serif;letter-spacing:2px;border-left:3px solid var(--red-army);z-index:20}
    .map-legend{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.85);color:#ddd;padding:8px 12px;border-radius:5px;font-size:10px;line-height:1.8;z-index:20}
    .map-legend-item{display:flex;align-items:center;gap:5px}
    .legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

    /* ===== DYNAMIC MAP ELEMENTS ===== */
    .map-anim-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
    .map-smoke{position:absolute;width:30px;height:30px;border-radius:50%;z-index:4;pointer-events:none;opacity:0;transition:opacity 0.8s;filter:blur(3px)}
    .map-smoke.visible{opacity:0.35;animation:smokeRise 3s infinite}
    @keyframes smokeRise{0%{transform:translateY(0) scale(1);opacity:0.35}50%{transform:translateY(-8px) scale(1.3);opacity:0.15}100%{transform:translateY(-16px) scale(1.6);opacity:0}}
    .map-flag{position:absolute;z-index:6;pointer-events:none;opacity:0;transition:opacity 0.5s}
    .map-flag.visible{opacity:1}
    .map-flag-pole{width:2px;height:18px;background:rgba(255,255,255,0.6);margin-left:3px}
    .map-flag-cloth{width:12px;height:8px;background:#CC3333;position:relative;top:-10px;left:4px;animation:flagWave 1.5s ease-in-out infinite;transform-origin:left center;border-radius:0 1px 1px 0}
    @keyframes flagWave{0%,100%{transform:skewY(0deg)}25%{transform:skewY(-3deg) scaleX(0.95)}75%{transform:skewY(2deg) scaleX(1.05)}}
    .map-campfire{position:absolute;z-index:4;pointer-events:none;opacity:0;transition:opacity 0.5s}
    .map-campfire.visible{opacity:1}
    .map-campfire-flame{width:4px;height:6px;background:radial-gradient(ellipse at bottom,#ff6600,#ff3300,transparent);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;animation:flame 0.8s ease-in-out infinite alternate;position:relative}
    .map-campfire-glow{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,rgba(255,100,0,0.25),transparent);top:-4px;left:-5px;animation:glowPulse 2s infinite}
    @keyframes flame{0%{transform:scaleX(1) scaleY(1);opacity:0.9}100%{transform:scaleX(0.7) scaleY(1.2);opacity:1}}
    @keyframes glowPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.6;transform:scale(1.2)}}
    .map-enemy{position:absolute;z-index:4;pointer-events:none;opacity:0;transition:opacity 0.5s}
    .map-enemy.visible{opacity:0.7}
    .map-enemy-icon{font-size:8px;color:#6688cc;animation:enemyBlink 2s infinite;text-shadow:0 0 4px rgba(68,85,170,0.5)}
    @keyframes enemyBlink{0%,80%,100%{opacity:0.7}90%{opacity:0.2}}
    .map-explosion{position:absolute;width:20px;height:20px;border-radius:50%;z-index:7;pointer-events:none;background:radial-gradient(circle,rgba(255,200,50,0.9),rgba(255,100,0,0.5),transparent);opacity:0;transform:translate(-50%,-50%)}
    .map-explosion.flash{animation:explode 0.6s ease-out forwards}
    @keyframes explode{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3)}30%{opacity:0.9;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}
    .river-particle{position:absolute;width:3px;height:1px;background:rgba(74,124,155,0.5);z-index:2;pointer-events:none;border-radius:1px}

    /* ===== SCENE PANEL ===== */
    .scene-overlay-panel{position:absolute;inset:0;z-index:15;display:none;background:#1a1a1a}
    .scene-overlay-panel.show{display:block}
    .scene-overlay-panel img{width:100%;height:100%;object-fit:cover}
    .scene-overlay-panel .scene-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 60%,rgba(0,0,0,0.6) 100%)}
    .scene-toggle{position:absolute;top:12px;right:12px;z-index:25;background:rgba(0,0,0,0.7);color:var(--gold);border:1px solid rgba(212,168,67,0.4);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:all 0.2s;font-family:'Noto Sans SC',sans-serif}
    .scene-toggle:hover{background:rgba(212,168,67,0.2)}

    /* ===== NARRATIVE PANEL ===== */
    .narrative-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(245,230,200,0.85)}
    .narrative-content{flex:1;padding:28px 32px;overflow-y:auto;line-height:2;font-size:15px;font-family:'Noto Serif SC',serif;color:var(--ink)}
    .narrative-content::-webkit-scrollbar{width:5px}
    .narrative-content::-webkit-scrollbar-thumb{background:var(--parchment-dark);border-radius:3px}
    .narrative-text{margin-bottom:14px;opacity:0;transform:translateY(8px);transition:all 0.5s ease}
    .narrative-text.visible{opacity:1;transform:translateY(0)}
    .narrative-text.speaking{background:rgba(212,168,67,0.1);border-left:3px solid var(--gold);padding-left:12px;border-radius:0 4px 4px 0}
    .narrative-highlight{background:linear-gradient(transparent 60%,rgba(204,51,51,0.15) 60%);padding:0 2px;font-weight:700}
    .narrative-date{color:var(--red-army);font-weight:700;font-size:13px;margin-bottom:8px;letter-spacing:2px}
    .decision-panel{border-top:2px solid var(--parchment-dark);padding:18px 32px;background:linear-gradient(180deg,var(--parchment),var(--parchment-dark));flex-shrink:0}
    .decision-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;color:var(--red-dark);margin-bottom:12px;letter-spacing:2px}
    .choices{display:flex;flex-direction:column;gap:8px}
    .choice-btn{background:var(--parchment);border:2px solid var(--ink-light);padding:12px 18px;text-align:left;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:14px;line-height:1.6;color:var(--ink);transition:all 0.25s;border-radius:4px}
    .choice-btn:hover{border-color:var(--red-army);background:rgba(204,51,51,0.05);transform:translateX(4px)}
    .choice-label{display:inline-block;background:var(--red-dark);color:#fff;width:22px;height:22px;text-align:center;line-height:22px;border-radius:3px;font-size:12px;font-weight:700;margin-right:8px;flex-shrink:0}

    /* Narration indicator */
    .narrating-indicator{position:fixed;bottom:16px;right:16px;background:rgba(44,24,16,0.92);color:var(--gold);padding:6px 14px;border-radius:16px;font-size:12px;z-index:60;display:none;align-items:center;gap:6px;border:1px solid rgba(212,168,67,0.4)}
    .narrating-indicator.show{display:flex}
    .narrating-dot{width:6px;height:6px;border-radius:50%;background:var(--red-army);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    /* Outcome */
    .outcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity 0.5s}
    .outcome-overlay.show{opacity:1;pointer-events:auto}
    .outcome-card{background:var(--parchment);max-width:540px;width:90%;padding:36px;border-radius:8px;text-align:center;font-family:'Noto Serif SC',serif;transform:scale(0.9);transition:transform 0.3s;max-height:80vh;overflow-y:auto}
    .outcome-overlay.show .outcome-card{transform:scale(1)}
    .outcome-icon{font-size:44px;margin-bottom:12px}
    .outcome-title{font-size:20px;font-weight:900;color:var(--red-dark);margin-bottom:14px;letter-spacing:4px}
    .outcome-text{font-size:14px;line-height:2;color:var(--ink-light);margin-bottom:10px;text-align:left}
    .outcome-effect{display:inline-block;background:rgba(139,0,0,0.08);padding:3px 12px;border-radius:4px;font-size:12px;margin:3px;color:var(--red-dark)}
    .outcome-btn{margin-top:18px;background:var(--red-dark);color:var(--gold);border:none;padding:10px 36px;font-size:15px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:4px;border-radius:4px;transition:all 0.3s}
    .outcome-btn:hover{background:#a00000}

    /* ===== TACTICAL MINI-GAME ===== */
    .tactical-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:55;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .tactical-overlay.show{display:flex}
    .tactical-card{background:linear-gradient(135deg,#1a0e06,#2C1810);border:2px solid rgba(212,168,67,0.5);border-radius:12px;width:90%;max-width:520px;padding:28px 32px;text-align:center;color:var(--gold);position:relative;overflow:hidden}
    .tactical-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top center,rgba(204,51,51,0.1),transparent 70%);pointer-events:none}
    .tactical-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:900;letter-spacing:4px;margin-bottom:6px;position:relative}
    .tactical-subtitle{font-size:12px;opacity:0.6;margin-bottom:20px;position:relative}
    .tactical-area{position:relative;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px}

    /* Power bar (timing game) */
    .power-bar-wrap{width:80%;height:30px;background:rgba(255,255,255,0.08);border-radius:15px;position:relative;overflow:hidden;border:1px solid rgba(212,168,67,0.3)}
    .power-bar-fill{height:100%;background:linear-gradient(90deg,#336633,#88cc44,#ffcc00,#ff6600,#cc0000);border-radius:15px;transition:none;width:0%}
    .power-bar-zone{position:absolute;top:0;height:100%;border-left:2px dashed rgba(255,255,255,0.5);border-right:2px dashed rgba(255,255,255,0.5);background:rgba(212,168,67,0.15);z-index:2}
    .power-bar-indicator{position:absolute;top:-8px;width:4px;height:46px;background:#fff;border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,0.6);z-index:3;transition:none}
    .power-bar-label{margin-top:10px;font-size:12px;opacity:0.5}
    .power-tap-btn{margin-top:14px;background:var(--red-army);color:#fff;border:2px solid var(--gold);padding:14px 48px;font-size:18px;font-family:'Noto Serif SC',serif;letter-spacing:6px;cursor:pointer;border-radius:6px;transition:all 0.15s;position:relative}
    .power-tap-btn:active{transform:scale(0.95);background:#a02222}

    /* Recon cards */
    .recon-cards{display:flex;gap:14px;justify-content:center}
    .recon-card{width:130px;height:160px;background:linear-gradient(135deg,rgba(44,24,16,0.9),rgba(60,30,15,0.9));border:2px solid rgba(212,168,67,0.3);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all 0.25s;position:relative;overflow:hidden}
    .recon-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,0.4)}
    .recon-card:active{transform:scale(0.96)}
    .recon-card-icon{font-size:36px}
    .recon-card-text{font-size:11px;color:rgba(212,168,67,0.8);font-family:'Noto Serif SC',serif}
    .recon-card.selected{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,67,0.4)}
    .recon-card.correct{border-color:#44aa44;box-shadow:0 0 20px rgba(68,170,68,0.4)}
    .recon-card.wrong{border-color:#cc4444;box-shadow:0 0 20px rgba(204,68,68,0.3)}
    .recon-card.reveal{animation:cardFlip 0.4s ease}
    @keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}

    /* Target click game */
    .target-field{width:100%;height:200px;background:rgba(255,255,255,0.03);border:1px solid rgba(212,168,67,0.2);border-radius:8px;position:relative;overflow:hidden;cursor:crosshair}
    .target-circle{position:absolute;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform 0.1s}
    .target-circle:active{transform:translate(-50%,-50%) scale(0.85)}
    .target-circle.enemy{background:radial-gradient(circle,rgba(68,85,170,0.9),rgba(68,85,170,0.3));border:2px solid #6688cc;box-shadow:0 0 12px rgba(68,85,170,0.5)}
    .target-circle.friendly{background:radial-gradient(circle,rgba(204,51,51,0.9),rgba(204,51,51,0.3));border:2px solid #cc5555;box-shadow:0 0 12px rgba(204,51,51,0.5)}
    .target-circle.hit{animation:targetHit 0.3s forwards}
    @keyframes targetHit{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.5;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}}
    .target-circle.miss-flash{animation:missFlash 0.3s}
    @keyframes missFlash{0%,100%{border-color:#cc5555}50%{border-color:#fff}}
    .target-score{position:absolute;top:8px;right:12px;font-size:14px;font-weight:700;z-index:5}
    .target-hits{color:#44aa44}
    .target-misses{color:#cc4444}
    .target-timer{position:absolute;top:8px;left:12px;font-size:13px;opacity:0.7;z-index:5}
    .target-hint{margin-top:8px;font-size:11px;opacity:0.5}

    /* Sequence game (bridge crossing) */
    .bridge-planks{display:flex;gap:8px;justify-content:center;align-items:flex-end;height:120px;margin:10px 0}
    .bridge-plank{width:48px;background:linear-gradient(180deg,#8B6914,#6B4F10);border:1px solid #a07828;border-radius:3px;cursor:pointer;transition:all 0.2s;opacity:0.3;transform:translateY(20px)}
    .bridge-plank.ready{opacity:0.6;transform:translateY(0)}
    .bridge-plank.next{opacity:1;transform:translateY(-4px);box-shadow:0 4px 12px rgba(160,120,40,0.4);animation:plankPulse 1s infinite}
    .bridge-plank.placed{opacity:1;transform:translateY(0);background:linear-gradient(180deg,#aa8820,#8B6914);border-color:#ccaa40}
    .bridge-plank.wrong{background:linear-gradient(180deg,#882222,#661111);border-color:#aa3333;animation:plankShake 0.3s}
    @keyframes plankPulse{0%,100%{box-shadow:0 4px 12px rgba(160,120,40,0.4)}50%{box-shadow:0 4px 20px rgba(212,168,67,0.6)}}
    @keyframes plankShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .bridge-river{width:80%;height:8px;background:linear-gradient(90deg,rgba(74,124,155,0.3),rgba(74,124,155,0.6),rgba(74,124,155,0.3));border-radius:4px;margin:0 auto;position:relative;overflow:hidden}
    .bridge-river::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);animation:riverShimmer 2s infinite}
    @keyframes riverShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    .bridge-progress{margin-top:10px;font-size:12px;opacity:0.6}

    /* Tactical result */
    .tactical-result{margin-top:16px;padding:14px;background:rgba(0,0,0,0.3);border-radius:8px;border-left:3px solid var(--gold)}
    .tactical-result-title{font-size:14px;font-weight:700;margin-bottom:6px}
    .tactical-result-text{font-size:12px;opacity:0.8;line-height:1.8;text-align:left}
    .tactical-result-effects{margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .tactical-effect{font-size:11px;padding:2px 10px;border-radius:10px;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.3)}
    .tactical-effect.positive{color:#44aa44;border-color:rgba(68,170,68,0.3)}
    .tactical-effect.negative{color:#cc6644;border-color:rgba(204,102,68,0.3)}
    .tactical-continue-btn{margin-top:16px;background:var(--red-dark);color:var(--gold);border:1px solid var(--gold);padding:8px 28px;font-size:14px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:3px;border-radius:4px;transition:all 0.2s}
    .tactical-continue-btn:hover{background:#a00000}

    /* End Screen */
    #end-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a0000,#3d0000,#1a0000);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:var(--gold);font-family:'Noto Serif SC',serif}
    #end-screen.active{display:flex}
    .end-bg{position:absolute;inset:0;background:url('https://www.coze.cn/s/dB0AE89EaDY/') center/cover no-repeat;filter:brightness(0.15) saturate(0.4)}
    .end-content{position:relative;z-index:2;text-align:center}
    .end-title{font-size:44px;font-weight:900;letter-spacing:10px;margin-bottom:16px}
    .end-rank{font-size:24px;margin-bottom:10px}
    .end-score{font-size:16px;opacity:0.8;margin-bottom:24px}
    .end-summary{max-width:480px;text-align:center;font-size:13px;line-height:2;opacity:0.7;margin-bottom:28px}
    .end-btn{background:transparent;color:var(--gold);border:2px solid var(--gold);padding:12px 44px;font-size:16px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:6px;transition:all 0.3s}
    .end-btn:hover{background:rgba(212,168,67,0.15)}

    @media(max-width:900px){
      .game-main{flex-direction:column}
      .map-panel{width:100%;height:40%;border-right:none;border-bottom:3px solid rgba(212,168,67,0.5)}
      .start-title{font-size:40px;letter-spacing:8px}
      .top-controls .audio-controls{display:none}
      .tactical-card{padding:20px 16px}
      .recon-cards{gap:8px}
      .recon-card{width:100px;height:130px}
    }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <div class="start-bg"></div>
  <div class="start-content">
    <div class="start-title">四渡赤水</div>
    <div class="start-title-en">CROSSING THE CHISHUI</div>
    <div class="start-quote" data-zh="四渡赤水才是我的得意之笔。—— 毛泽东" data-en="Crossing the Chishui four times is my proudest masterpiece. — Mao Zedong">四渡赤水才是我的得意之笔。—— 毛泽东</div>
    <div class="start-quote-en">"Crossing the Chishui four times is my proudest masterpiece." — Mao Zedong</div>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
    </div>
    <button class="start-btn" onclick="startGame()" data-zh="进入战场" data-en="Enter Battle">进入战场</button>
  </div>
</div>

<!-- GAME CONTAINER -->
<div id="game-container">
  <div class="top-bar">
    <div class="chapter-title" id="chapterTitle">序章</div>
    <div class="top-controls">
      <div class="audio-controls">
        <button class="audio-btn active" id="btnMusic" onclick="toggleMusic()" title="Music">🎵</button>
        <input type="range" class="vol-slider" id="musicVol" min="0" max="100" value="35" oninput="setMusicVol(this.value)">
        <button class="audio-btn active" id="btnNarrate" onclick="toggleNarration()" title="Narration">🗣️</button>
        <input type="range" class="vol-slider" id="narrVol" min="0" max="100" value="80" oninput="setNarrVol(this.value)">
      </div>
      <div class="lang-mini">
        <button class="lang-mini-btn active" id="langZhMini" onclick="setLang('zh')">中</button>
        <button class="lang-mini-btn" id="langEnMini" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="resources">
      <button class="back-btn" id="backBtn" onclick="goBack()" data-zh="↩ 返回" data-en="↩ Back">↩ 返回</button>
      <div class="resource-item"><span class="resource-icon">⚔️</span><span class="resource-value" id="troopVal">30000</span><span class="resource-label" data-zh="兵力" data-en="Troops">兵力</span></div>
      <div class="resource-item"><span class="resource-icon">📦</span><span class="resource-value" id="supplyVal">70</span><span class="resource-label" data-zh="补给" data-en="Supply">补给</span></div>
      <div class="resource-item"><span class="resource-icon">🔥</span><span class="resource-value" id="moraleVal">80</span><span class="resource-label" data-zh="士气" data-en="Morale">士气</span></div>
    </div>
  </div>

  <div class="game-main">

<div class="narrating-indicator" id="narrIndicator"><span class="narrating-dot"></span><span data-zh="朗读中..." data-en="Narrating...">朗读中...</span></div>

<!-- OUTCOME -->

<!-- TACTICAL MINI-GAME -->

<script>
// ===== LANGUAGE =====
let lang='zh';
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.lang-mini-btn').forEach(b=>b.classList.remove('active'));
  if(l==='zh'){
    document.querySelectorAll('.lang-btn')[0].classList.add('active');
    document.getElementById('langZhMini').classList.add('active');
  }else{
    document.querySelectorAll('.lang-btn')[1].classList.add('active');
    document.getElementById('langEnMini').classList.add('active');
  }
  document.querySelectorAll('[data-zh]').forEach(el=>{
    if(el.tagName==='INPUT')return;
    el.textContent=l==='zh'?el.dataset.zh:el.dataset.en;
  });
  if(document.getElementById('game-container').classList.contains('active'))showStep();
}
function T(zh,en){return lang==='zh'?zh:en}

// ===== SCENE IMAGES =====
const sceneImages={
  crossing:'https://www.coze.cn/s/Z_mnPZL_0Mw/',
  battle:'https://www.coze.cn/s/XO1-klVmpOg/',
  charge:'https://www.coze.cn/s/eyCzg3RPtUY/',
  bridge:'https://www.coze.cn/s/dB0AE89EaDY/',
  map:'https://www.coze.cn/s/6uI9bcNPBAE/',
};

// ===== MAP NODES =====
const mapNodes={
  zunyi:{x:67,y:21,label:{zh:'遵义',en:'Zunyi'},badge:'壹'},
  loushan:{x:61,y:13,label:{zh:'娄山关',en:'Loushanguan'},badge:'肆'},
  tucheng:{x:42,y:34,label:{zh:'土城',en:'Tucheng'},badge:'贰'},
  xuyong:{x:19,y:20,label:{zh:'叙永',en:'Xuyong'},badge:''},
  zhaxi:{x:9,y:46,label:{zh:'扎西',en:'Zhaxi'},badge:''},
  gulin:{x:29,y:26,label:{zh:'古蔺',en:'Gulin'},badge:''},
  maotai:{x:68,y:36,label:{zh:'茅台',en:'Moutai'},badge:'伍'},
  taiping:{x:50,y:33,label:{zh:'太平渡',en:'Taiping Ferry'},badge:'叁'},
  erlang:{x:38,y:47,label:{zh:'二郎滩',en:'Erlang Beach'},badge:'陆'},
  tiziyan:{x:22,y:67,label:{zh:'梯子岩',en:'Tiziyan'},badge:'柒'},
  guiyang:{x:74,y:55,label:{zh:'贵阳',en:'Guiyang'},badge:''},
  end:{x:7,y:81,label:{zh:'终点',en:'End'},badge:'捌'},
};

const routeSegments=[
  {from:'zunyi',to:'tucheng',cross:1,ch:0},
  {from:'tucheng',to:'xuyong',cross:0,ch:0},
  {from:'xuyong',to:'zhaxi',cross:0,ch:0},
  {from:'zhaxi',to:'gulin',cross:0,ch:1},
  {from:'gulin',to:'taiping',cross:2,ch:1},
  {from:'taiping',to:'zunyi',cross:0,ch:1},
  {from:'zunyi',to:'loushan',cross:0,ch:1},
  {from:'loushan',to:'zunyi',cross:0,ch:2},
  {from:'zunyi',to:'maotai',cross:3,ch:2},
  {from:'maotai',to:'erlang',cross:4,ch:3},
  {from:'erlang',to:'tiziyan',cross:0,ch:3},
  {from:'tiziyan',to:'guiyang',cross:0,ch:3},
  {from:'guiyang',to:'end',cross:0,ch:3},
];

let mapState={current:'zunyi',visited:['zunyi'],traversedSegs:[],sceneVisible:false};

function initMapOverlays(){
  const overlay=document.getElementById('mapOverlay');
  if(!overlay)return;
  overlay.innerHTML='';
  Object.entries(mapNodes).forEach(([key,node])=>{
    const div=document.createElement('div');
    div.className='map-node';
    div.id='node-'+key;
    div.style.left=node.x+'%';
    div.style.top=node.y+'%';
    div.innerHTML=`<div class="map-node-dot"></div><div class="map-node-label">${T(node.label.zh,node.label.en)}</div>${node.badge?`<div class="map-node-badge">${node.badge}</div>`:''}`;
    overlay.appendChild(div);
  });
  updateMapVisuals();
  initDynamicElements();
  initAnimCanvas();
}

function initRouteLines(){
  const svg=document.getElementById('mapRoutes');
  if(!svg)return;
  svg.innerHTML='';
  routeSegments.forEach((seg,i)=>{
    const from=mapNodes[seg.from],to=mapNodes[seg.to];
    if(!from||!to)return;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',from.x);
    line.setAttribute('y1',from.y);
    line.setAttribute('x2',to.x);
    line.setAttribute('y2',to.y);
    line.id='route-'+i;
    svg.appendChild(line);
  });
}

function updateMapVisuals(){
  Object.entries(mapNodes).forEach(([key])=>{
    const el=document.getElementById('node-'+key);
    if(!el)return;
    el.classList.remove('visited','current','active');
    if(mapState.visited.includes(key))el.classList.add('visited');
    if(key===mapState.current)el.classList.add('current');
  });
  routeSegments.forEach((seg,i)=>{
    const line=document.getElementById('route-'+i);
    if(!line)return;
    line.classList.remove('traversed','active');
    if(mapState.traversedSegs.includes(i))line.classList.add('traversed');
  });
  const cur=mapNodes[mapState.current];
  if(cur){
    const army=document.getElementById('mapArmy');
    if(army){
      army.style.left=cur.x+'%';
      army.style.top=cur.y+'%';
    }
  }
  const lastCross=mapState.traversedSegs.map(i=>routeSegments[i]).filter(s=>s.cross>0);
  const crossNum=lastCross.length;
  const ci=document.getElementById('crossingIndicator');
  if(!ci)return;
  if(crossNum>0){
    const last=lastCross[lastCross.length-1];
    ci.innerHTML=`${T('第','Crossing ')}${last.cross}${T('渡赤水','')}`;
    ci.style.display='block';
  }else{
    ci.innerHTML=T('遵义 · 出发','Zunyi · Departure');
    ci.style.display='block';
  }
  updateDynamicVisibility();
}

// ===== DYNAMIC MAP ELEMENTS =====
let animCanvas,animCtx,animFrame;
let particles=[];

const dynamicConfig={
  '1-0':{flags:[{x:44,y:32}],camps:[{x:40,y:36}],enemies:[],battle:{x:42,y:30,intensity:2}},
  '1-1':{flags:[{x:44,y:32}],camps:[{x:40,y:36}],enemies:[],battle:null},
  '2-0':{flags:[{x:11,y:44}],camps:[{x:13,y:48}],enemies:[],battle:null},
  '2-1':{flags:[{x:11,y:44}],camps:[{x:13,y:48}],enemies:[],battle:null},
  '2-3':{flags:[{x:63,y:15}],camps:[{x:59,y:17}],enemies:[],battle:{x:61,y:11,intensity:3}},
  '3-0':{flags:[{x:69,y:22}],camps:[{x:65,y:25}],enemies:[],battle:null},
  '3-1':{flags:[{x:70,y:38}],camps:[{x:66,y:40}],enemies:[],battle:null},
  '4-0':{flags:[{x:40,y:49}],camps:[{x:36,y:51}],enemies:[],battle:null},
};

function initDynamicElements(){
  const c=document.getElementById('dynamicElements');
  if(!c)return;
  c.innerHTML='';
  for(let i=0;i<3;i++){
    const f=document.createElement('div');
    f.className='map-flag';
    f.id='flag-'+i;
    f.innerHTML='<div class="map-flag-cloth"></div><div class="map-flag-pole"></div>';
    c.appendChild(f);
  }
  for(let i=0;i<4;i++){
    const e=document.createElement('div');
    e.className='map-campfire';
    e.id='camp-'+i;
    e.innerHTML='<div class="map-campfire-glow"></div><div class="map-campfire-flame"></div>';
    c.appendChild(e);
  }
  for(let i=0;i<4;i++){
    const e=document.createElement('div');
    e.className='map-enemy';
    e.id='enemy-'+i;
    e.innerHTML='<div class="map-enemy-icon">⚔️</div>';
    c.appendChild(e);
  }
  for(let i=0;i<4;i++){
    const s=document.createElement('div');
    s.className='map-smoke';
    s.id='smoke-'+i;
    s.style.background=`radial-gradient(circle,rgba(${150+Math.random()*80},${120+Math.random()*60},${80+Math.random()*40},0.6),transparent)`;
    c.appendChild(s);
  }
  const exp=document.createElement('div');
  exp.className='map-explosion';
  exp.id='explosion-0';
  c.appendChild(exp);
  for(let i=0;i<8;i++){
    const r=document.createElement('div');
    r.className='river-particle';
    r.id='river-'+i;
    r.style.left=(28+Math.random()*6)+'%';
    r.style.top=(Math.random()*100)+'%';
    r.style.animation=`riverFlow ${3+Math.random()*4}s linear ${Math.random()*3}s infinite`;
    c.appendChild(r);
  }
}

function updateDynamicVisibility(){
  const key=state.chapter+'-'+state.step;
  const cfg=dynamicConfig[key];
  if(!cfg)return;
  document.querySelectorAll('.map-flag,.map-campfire,.map-enemy,.map-smoke').forEach(e=>e.classList.remove('visible'));
  (cfg.flags||[]).forEach((f,i)=>{
    const el=document.getElementById('flag-'+i);
    if(el){
      el.style.left=f.x+'%';
      el.style.top=f.y+'%';
      el.classList.add('visible');
    }
  });
  (cfg.camps||[]).forEach((c,i)=>{
    const el=document.getElementById('camp-'+i);
    if(el){
      el.style.left=c.x+'%';
      el.style.top=c.y+'%';
      el.classList.add('visible');
    }
  });
  (cfg.enemies||[]).forEach((e,i)=>{
    const el=document.getElementById('enemy-'+i);
    if(el){
      el.style.left=e.x+'%';
      el.style.top=e.y+'%';
      el.classList.add('visible');
    }
  });
  if(cfg.battle){
    const b=cfg.battle;
    for(let i=0;i<Math.min(b.intensity,4);i++){
      const s=document.getElementById('smoke-'+i);
      if(s){
        s.style.left=(b.x-2+Math.random()*4)+'%';
        s.style.top=(b.y-2+Math.random()*4)+'%';
        s.classList.add('visible');
      }
    }
    triggerExplosion(b.x,b.y);
  }
}

function triggerExplosion(x,y){
  const el=document.getElementById('explosion-0');
  if(!el)return;
  el.style.left=x+'%';
  el.style.top=y+'%';
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

let animRunning=false;
function initAnimCanvas(){
  animCanvas=document.getElementById('mapAnimCanvas');
  if(!animCanvas)return;
  const rect=animCanvas.parentElement.getBoundingClientRect();
  animCanvas.width=rect.width||600;
  animCanvas.height=rect.height||800;
  animCtx=animCanvas.getContext('2d');
  particles=[];
  for(let i=0;i<30;i++){
    particles.push({
      x:Math.random()*animCanvas.width,
      y:Math.random()*animCanvas.height,
      vx:(Math.random()-0.5)*0.3,
      vy:-0.1-Math.random()*0.3,
      size:1+Math.random()*2,
      alpha:0.1+Math.random()*0.2,
      color:Math.random()>0.5?'204,51,51':'212,168,67',
      life:Math.random()*200+100
    });
  }
  if(!animRunning){
    animRunning=true;
    animateCanvas();
  }
}
function animateCanvas(){
  if(!animRunning)return;
  animCtx.clearRect(0,0,animCanvas.width,animCanvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    if(p.life<=0||p.y<0||p.x<0||p.x>animCanvas.width){
      p.x=Math.random()*animCanvas.width;
      p.y=animCanvas.height+Math.random()*20;
      p.life=100+Math.random()*200;
      p.alpha=0.1+Math.random()*0.2;
    }
    const fadeRatio=Math.min(1,p.life/30);
    animCtx.beginPath();
    animCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    animCtx.fillStyle=`rgba(${p.color},${p.alpha*fadeRatio})`;
    animCtx.fill();
  });
  animFrame=requestAnimationFrame(animateCanvas);
}

function advanceMap(targetKey){
  if(mapState.current===targetKey)return;
  const graph={};
  routeSegments.forEach((seg,i)=>{
    if(!graph[seg.from])graph[seg.from]=[];
    graph[seg.from].push({to:seg.to,idx:i});
  });
  const visited=new Set([mapState.current]);
  const queue=[[mapState.current,[]]];
  let found=null;
  while(queue.length>0){
    const[curr,path]=queue.shift();
    for(const edge of(graph[curr]||[])){
      if(edge.to===targetKey){
        found=[...path,edge.idx];
        break;
      }
      if(!visited.has(edge.to)){
        visited.add(edge.to);
        queue.push([edge.to,[...path,edge.idx]]);
      }
    }
    if(found)break;
  }
  if(found){
    found.forEach((segIdx,i)=>{
      if(!mapState.traversedSegs.includes(segIdx)){
        mapState.traversedSegs.push(segIdx);
        const seg=routeSegments[segIdx];
        if(!mapState.visited.includes(seg.from))mapState.visited.push(seg.from);
        const line=document.getElementById('route-'+segIdx);
        if(line){
          line.classList.add('active');
          setTimeout(()=>line.classList.remove('active'),1500);
        }
      }
    });
  }
  if(!mapState.visited.includes(targetKey))mapState.visited.push(targetKey);
  mapState.current=targetKey;
  updateMapVisuals();
}

let audioCtx=null,masterGain=null,bgmAudio=null;
let musicOn=true,narrOn=true,musicVol=0.35,narrVol=0.8;

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=1.0;
  masterGain.connect(audioCtx.destination);
  startBGM();
}

function startBGM(){
  if(!musicOn)return;
  if(!bgmAudio){
    bgmAudio=new Audio('https://www.coze.cn/s/uPojbqpy18M/');
    bgmAudio.loop=true;
    bgmAudio.volume=musicVol;
  }
  bgmAudio.play().catch(()=>{});
}

function playSFX(type){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  function sfxNote(freq,t,dur,vol,type_='triangle'){
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type_;
    o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start(t);
    o.stop(t+dur+0.05);
  }
  switch(type){
    case'click':sfxNote(800,now,0.06,0.06,'sine');break;
    case'choice':sfxNote(440,now,0.15,0.1);break;
    case'victory':[440,554,659,880].forEach((f,i)=>sfxNote(f,now+i*0.18,0.4,0.1));break;
    case'chapter':[330,392,494,587].forEach((f,i)=>sfxNote(f,now+i*0.22,0.35,0.08));break;
    case'defeat':sfxNote(300,now,0.8,0.06,'sawtooth');break;
    case'march':[80,80,80].forEach((f,i)=>sfxNote(f,now+i*0.3,0.2,0.1,'square'));break;
    case'perfect':sfxNote(523,now,0.12,0.1);sfxNote(659,now+0.1,0.12,0.1);break;
    case'good':sfxNote(440,now,0.1,0.08);break;
    case'miss':sfxNote(200,now,0.15,0.06,'sawtooth');break;
    default:break;
  }
}

// ===== EMOTIONAL TTS =====
let isNarrating=false;
function detectEmotion(text){
  const t=text.toLowerCase();
  if(/险|惨|败|亡|危|困|牺牲|encircled|defeat/.test(t))return'dire';
  if(/胜|捷|成功|辉煌|victory|success/.test(t))return'triumph';
  if(/秘密|悄|暗|secret|stealth/.test(t))return'stealth';
  if(/果断|命令|急|decisive|urgent/.test(t))return'urgent';
  return'neutral';
}

function speakEmotional(text,onEnd){
  if(!narrOn||!('speechSynthesis' in window)){
    if(onEnd)onEnd();
    return;
  }
  speechSynthesis.cancel();
  const plain=text.replace(/<[^>]*>/g,'').replace(/&nbsp;/g,' ');
  const sentences=plain.split(/(?<=[。！？；\.\!\?;])/g).filter(s=>s.trim());
  let idx=0;
  const voices=speechSynthesis.getVoices();
  const zhVoice=voices.find(v=>v.lang.includes('zh')&&v.localService);
  
  function speakNext(){
    if(idx>=sentences.length||!narrOn){
      isNarrating=false;
      document.getElementById('narrIndicator').classList.remove('show');
      if(onEnd)onEnd();
      return;
    }
    const s=sentences[idx].trim();
    if(!s){idx++;speakNext();return}
    const u=new SpeechSynthesisUtterance(s);
    u.lang=lang==='zh'?'zh-CN':'en-US';
    u.volume=narrVol;
    const e=detectEmotion(s);
    switch(e){
      case'dire':u.rate=0.78;u.pitch=0.85;break;
      case'triumph':u.rate=0.92;u.pitch=1.15;break;
      case'stealth':u.rate=0.72;u.pitch=0.9;break;
      case'urgent':u.rate=1.05;u.pitch=1.1;break;
      default:u.rate=0.88;u.pitch=1.0;
    }
    if(zhVoice&&lang==='zh')u.voice=zhVoice;
    isNarrating=true;
    document.getElementById('narrIndicator').classList.add('show');
    u.onend=()=>{
      idx++;
      const pause=e==='dire'?500:e==='stealth'?600:e==='triumph'?350:420;
      setTimeout(speakNext,pause);
    };
    u.onerror=()=>{
      isNarrating=false;
      document.getElementById('narrIndicator').classList.remove('show');
      if(onEnd)onEnd();
    };
    speechSynthesis.speak(u);
  }
  speakNext();
}

function speakNarrative(texts,elems){
  if(!narrOn)return;
  let i=0;
  function next(){
    if(i>=texts.length)return;
    document.querySelectorAll('.narrative-text.speaking').forEach(e=>e.classList.remove('speaking'));
    if(elems[i])elems[i].classList.add('speaking');
    speakEmotional(texts[i].replace(/<[^>]*>/g,''),()=>{
      if(elems[i])elems[i].classList.remove('speaking');
      i++;
      if(i<texts.length)setTimeout(next,700);
    });
  }
  next();
}

function stopNarr(){
  speechSynthesis.cancel();
  isNarrating=false;
  document.getElementById('narrIndicator').classList.remove('show');
  document.querySelectorAll('.narrative-text.speaking').forEach(e=>e.classList.remove('speaking'));
}

const tacticalEvents={
  '1-0':{type:'march',title:{zh:'急行军挑战',en:'Rapid March Challenge'},subtitle:{zh:'在金色区域按下',en:'Press in the gold zone'}},
  '2-1':{type:'recon',title:{zh:'侦察敌情',en:'Scout Enemy'},subtitle:{zh:'选择侦察方向',en:'Choose direction'}},
  '2-3':{type:'target',title:{zh:'伏击敌军',en:'Ambush Enemy'},subtitle:{zh:'点击敌军',en:'Click enemies'}},

};

let tacActive=false;
let tacAnimId=null;
let tacData={};

function shouldTriggerTactical(chapter,step){
  const key=chapter+'-'+step;
  return tacticalEvents[key]&&!state.tacCompleted.includes(key);
}

function showTactical(chapter,step){
  const key=chapter+'-'+step;
  const evt=tacticalEvents[key];
  if(!evt)return;
  tacActive=true;
  state.tacCompleted.push(key);
  playSFX('drum');
  document.getElementById('tacTitle').textContent=T(evt.title.zh,evt.title.en);
  document.getElementById('tacSubtitle').textContent=T(evt.subtitle.zh,evt.subtitle.en);

  switch(evt.type){
    case'march':initMarchGame();break;
    case'recon':initReconGame();break;

    case'bridge':initBridgeGame();break;

function initMarchGame(){
  const area=document.getElementById('tacArea');
  area.innerHTML=`
    <div class="power-bar-wrap">
      <div class="power-bar-zone" style="left:38%;width:24%"></div>
      <div class="power-bar-fill" id="powerFill"></div>
      <div class="power-bar-indicator" id="powerInd" style="left:0%"></div>
    </div>
    <div class="power-bar-label">${T('力量条在金色区域时按下！','Press in gold zone!')}</div>
    <button class="power-tap-btn" id="powerTap" onclick="marchTap()">${T('冲！','Charge!')}</button>
  `;
  tacData={dir:1,speed:2.5,pos:0,hits:[],round:0,maxRounds:3,running:true};
  animatePowerBar();
}
function animatePowerBar(){
  if(!tacData.running)return;
  tacData.pos+=tacData.dir*tacData.speed;
  if(tacData.pos>=100){tacData.pos=100;tacData.dir=-1}
  if(tacData.pos<=0){tacData.pos=0;tacData.dir=1}
  const fill=document.getElementById('powerFill');
  const ind=document.getElementById('powerInd');
  if(fill)fill.style.width=tacData.pos+'%';
  if(ind)ind.style.left=tacData.pos+'%';
  tacAnimId=requestAnimationFrame(animatePowerBar);
}
function marchTap(){
  if(!tacData.running)return;
  const pos=tacData.pos;
  const quality=pos>=38&&pos<=62?'perfect':pos>=28&&pos<=72?'good':'miss';
  tacData.hits.push(quality);
  tacData.round++;
  playSFX(quality);
  if(tacData.round>=tacData.maxRounds){
    tacData.running=false;
    if(tacAnimId)cancelAnimationFrame(tacAnimId);
    finishMarchGame();
  }else{
    tacData.speed+=0.4;
    tacData.pos=0;
    tacData.dir=1;
  }
}
function finishMarchGame(){
  const total=tacData.hits.filter(h=>h==='perfect').length*2 + tacData.hits.filter(h=>h==='good').length;
  let effects;
  if(total>=5)effects={troops:500,supply:5,morale:10};
  else if(total>=3)effects={troops:0,supply:0,morale:5};
  else effects={troops:-500,supply:-3,morale:-5};
  showTacticalResult({zh:'行军完成',en:'March Complete'},{zh:'挑战结束',en:'Challenge Complete'},effects);
}

function initReconGame(){
  const area=document.getElementById('tacArea');
  const dirs=[
    {icon:'🏔️',zh:'东北方向',en:'Northeast',correct:false},
    {icon:'🌊',zh:'西北方向',en:'Northwest',correct:true},
    {icon:'🌲',zh:'正南方向',en:'South',correct:false},
  ];
  tacData={dirs,chosen:false};
  let html='<div class="recon-cards">';
  dirs.forEach((d,i)=>{
    html+=`<div class="recon-card" id="recon${i}" onclick="reconPick(${i})"><div class="recon-card-icon">${d.icon}</div><div class="recon-card-text">${T(d.zh,d.en)}</div></div>`;
  });
  html+='</div>';
  area.innerHTML=html;
}
function reconPick(idx){
  if(tacData.chosen)return;
  tacData.chosen=true;
  playSFX('tap');
  const correct=tacData.dirs[idx].correct;
  let effects=correct?{troops:500,supply:5,morale:8}:{troops:-500,supply:-3,morale:-5};
  setTimeout(()=>{
    playSFX(correct?'recon_correct':'recon_wrong');
    showTacticalResult({zh:correct?'情报精准':'情报失误',en:correct?'Intel Correct':'Intel Wrong'},{zh:correct?'成功避开伏击':'遭遇伏击',en:correct?'Avoided Ambush':'Ambushed'},effects);

function initTargetGame(){
  const area=document.getElementById('tacArea');
  area.innerHTML=`
    <div class="target-field" id="targetField">
      <div class="target-timer" id="targetTimer">⏱ 8秒</div>
      <div class="target-score"><span class="target-hits" id="hitCount">0</span> / <span class="target-misses" id="missCount">0</span></div>
    </div>
    <div class="target-hint">${T('点击蓝色敌军','Click blue enemies')}</div>
  `;
  tacData={hits:0,misses:0,running:true,timeLeft:8};
  const timer=setInterval(()=>{
    tacData.timeLeft--;
    document.getElementById('targetTimer').textContent=`⏱ ${tacData.timeLeft}秒`;
    if(tacData.timeLeft<=0){
      clearInterval(timer);
      tacData.running=false;
      finishTargetGame();
    }
  },1000);
  setTimeout(spawnTarget,800);
}
function spawnTarget(){
  if(!tacData.running)return;
  const field=document.getElementById('targetField');
  const isEnemy=Math.random()>0.25;
  const size=24+Math.random()*16;
  const el=document.createElement('div');
  el.className='target-circle '+(isEnemy?'enemy':'friendly');
  el.style.width=size+'px';
  el.style.height=size+'px';
  el.style.left=(20+Math.random()*60)+'%';
  el.style.top=(15+Math.random()*70)+'%';
  el.onclick=(e)=>{
    e.stopPropagation();
    if(isEnemy){
      tacData.hits++;
      playSFX('target_hit');
    }else{
      tacData.misses++;
      playSFX('target_miss');
    }
    document.getElementById('hitCount').textContent=tacData.hits;
    document.getElementById('missCount').textContent=tacData.misses;
    el.classList.add('hit');
    setTimeout(()=>el.remove(),300);
  };
  field.appendChild(el);
  setTimeout(()=>{if(el.parentElement)el.remove()},2200);
  setTimeout(spawnTarget,800+Math.random()*600);
}
function finishTargetGame(){
  let effects=tacData.hits>=6&&tacData.misses===0?{troops:1000,supply:5,morale:12}:tacData.hits>=4?{troops:500,supply:3,morale:5}:{troops:-300,supply:-3,morale:-5};
  showTacticalResult({zh:'伏击结束',en:'Ambush Complete'},{zh:'战斗完成',en:'Battle Complete'},effects);
}

function initBridgeGame(){
  const area=document.getElementById('tacArea');
  const count=6;
  tacData={count,placed:0,errors:0,running:true};
  let html=`<div class="bridge-planks" id="bridgePlanks">`;
  for(let i=0;i<count;i++){
    html+=`<div class="bridge-plank ready" id="plank${i}" style="height:60px" onclick="plankTap(${i})">${i+1}</div>`;
  }
  html+=`</div><div class="bridge-river"></div><div class="bridge-progress" id="bridgeProgress">${T('按顺序1→6','Click 1→6')}</div>`;
  area.innerHTML=html;
  updatePlankHighlights();
}
function updatePlankHighlights(){
  for(let i=0;i<tacData.count;i++){
    const el=document.getElementById('plank'+i);
    el.classList.remove('next','placed','wrong');
    if(i<tacData.placed)el.classList.add('placed');
    else if(i===tacData.placed)el.classList.add('next');
  }
}
function plankTap(idx){
  if(!tacData.running)return;
  if(idx===tacData.placed){
    tacData.placed++;
    playSFX('plank_ok');
    updatePlankHighlights();
    if(tacData.placed>=tacData.count){
      tacData.running=false;
      setTimeout(finishBridgeGame,500);
    }
  }else{
    tacData.errors++;
    playSFX('plank_wrong');
  }
}
function finishBridgeGame(){
  let effects=tacData.errors===0?{troops:800,supply:8,morale:15}:tacData.errors<=2?{troops:200,supply:3,morale:5}:{troops:-800,supply:-8,morale:-8};

  if(effects.morale)html+=`<span class="tactical-effect ${effects.morale>0?'positive':'negative'}">🔥 ${effects.morale>0?'+':''}${effects.morale}</span>`;

  if(effects.morale)state.morale=Math.max(10,Math.min(100,state.morale+effects.morale));
  updateRes();
}

  document.getElementById('tacticalOverlay').classList.remove('show');

  if(state.step>=ch.steps.length)nextChapter();else showStep();
}

// ===== GAME LOGIC =====
function startGame(){
  document.getElementById('start-screen').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('start-screen').style.display='none';
    document.getElementById('game-container').classList.add('active');
    if(!audioCtx)initAudio();
    initMapOverlays();
    initRouteLines();
    showStep();
  },800);
}

function showStep(){
  stopNarr();
  const ch=chapters[state.chapter];
  if(!ch){endGame();return}
  const step=ch.steps[state.step];
  if(!step){nextChapter();return}

  document.getElementById('chapterTitle').textContent=T(ch.title.zh,ch.title.en);
  updateRes();
  updateBackBtn();

  if(step.mapTarget)advanceMap(step.mapTarget);

  const nc=document.getElementById('narrativeContent');
  const texts=T(step.text.zh,step.text.en);
  let html=`<div class="narrative-date">${T(step.date.zh,step.date.en)}</div>`;
  texts.forEach((p,i)=>{
    html+=`<div class="narrative-text" id="nt${i}">${p}</div>`;
  });
  nc.innerHTML=html;
  setTimeout(()=>{
    document.querySelectorAll('.narrative-text').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('visible'),i*200);
    });
  },100);

  const dp=document.getElementById('decisionPanel');
  if(step.decision){
    let dh=`<div class="decision-title">${T(step.decision.title.zh,step.decision.title.en)}</div><div class="choices">`;
    step.decision.choices.forEach((c,i)=>{
      dh+=`<button class="choice-btn" onclick="makeChoice(${i})"><span class="choice-label">${c.label}</span>${T(c.text.zh,c.text.en)}</button>`;
    });
    dh+='</div>';
    dp.innerHTML=dh;
  }else{
    dp.innerHTML=`<button class="choice-btn" style="margin:16px auto" onclick="advanceStep()"><span class="choice-label">▶</span>${T('继续','Continue')}</button>`;
  }

  setTimeout(()=>{
    const elems=texts.map((_,i)=>document.getElementById(`nt${i}`));
    speakNarrative(texts,elems);
  },1000);
}

function advanceStep(){
  saveSnapshot();
  state.step++;
  const ch=chapters[state.chapter];
  if(state.step>=ch.steps.length)nextChapter();else showStep();
}

function makeChoice(idx){
  const ch=chapters[state.chapter];
  const step=ch.steps[state.step];
  const choice=step.decision.choices[idx];
  const out=choice.outcome;
  stopNarr();
  playSFX('choice');
  saveSnapshot();

  state.score+=out.score;
  if(out.effects.troops)state.troops=Math.max(5000,state.troops+out.effects.troops);
  if(out.effects.supply)state.supply=Math.max(10,Math.min(100,state.supply+out.effects.supply));
  if(out.effects.morale)state.morale=Math.max(10,Math.min(100,state.morale+out.effects.morale));
  updateRes();

  document.getElementById('outcomeIcon').textContent=out.icon;
  document.getElementById('outcomeTitle').textContent=T(out.title.zh,out.title.en);
  document.getElementById('outcomeText').innerHTML=T(out.text.zh,out.text.en);
  let eh='';
  if(out.effects.troops)eh+=`<span class="outcome-effect">⚔️ ${out.effects.troops>0?'+':''}${out.effects.troops}</span>`;
  if(out.effects.supply)eh+=`<span class="outcome-effect">📦 ${out.effects.supply>0?'+':''}${out.effects.supply}</span>`;
  if(out.effects.morale)eh+=`<span class="outcome-effect">🔥 ${out.effects.morale>0?'+':''}${out.effects.morale}</span>`;
  document.getElementById('outcomeEffects').innerHTML=eh;
  document.getElementById('outcomeOverlay').classList.add('show');
}

function closeOutcome(){
  document.getElementById('outcomeOverlay').classList.remove('show');
  state.step++;
  const ch=chapters[state.chapter];
  if(state.step>=ch.steps.length)nextChapter();else showStep();
}

function nextChapter(){
  state.chapter++;
  state.step=0;
  if(state.chapter>=chapters.length)endGame();else showStep();
}

function updateRes(){
  document.getElementById('troopVal').textContent=state.troops.toLocaleString();
  document.getElementById('supplyVal').textContent=state.supply;
  document.getElementById('moraleVal').textContent=state.morale;
}

function endGame(){
  stopNarr();
  if(bgmAudio)bgmAudio.pause();
  document.getElementById('game-container').classList.remove('active');
  playSFX('complete');

  const max=160;
  const pct=state.score/max;
  let rank,title,summary;
  if(pct>=0.8){rank={zh:'🏆 战神级指挥官',en:'Legendary Commander'};title={zh:'用兵如神',en:'Master of War'};summary={zh:'你完美复刻四渡赤水，蒋介石四十万大军如棋子。',en:'You mastered the Four Crossings. 400k troops were pawns.'}}
  else if(pct>=0.6){rank={zh:'⭐ 优秀指挥官',en:'Distinguished Commander'};title={zh:'将才之风',en:'A General\'s Mettle'};summary={zh:'你成功带领红军突围。',en:'You led the army to victory.'}}
  else {rank={zh:'🎖️ 合格指挥官',en:'Competent Commander'};title={zh:'完成突围',en:'Broke out'};summary={zh:'你活下来了，但还有提升空间。',en:'You survived, but can do better.'}}

  document.getElementById('endTitle').textContent=T(title.zh,title.en);
  document.getElementById('endRank').textContent=T(rank.zh,rank.en);
  document.getElementById('endScore').textContent=`得分: ${state.score}/${max} | 兵力: ${state.troops}`;
  document.getElementById('endSummary').textContent=T(summary.zh,summary.en);
  document.getElementById('end-screen').classList.add('active');
}
