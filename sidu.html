      },
      // 画面15 - 支线：红小鬼李光（纯叙事）
      {
        date:{zh:'1935年4月 · 行军途中',en:'April 1935 · On the March'},
        mapTarget:'guiyang',
        text:{
          zh:['四渡赤水惊险突围，大军终于跳出四十万国军包围圈。','14岁的红小鬼李光，没有在正面战场浴血拼杀，却在整夜的绝密夜渡中默默坚守岗位，用稚嫩的双脚守住了全军的突围契机。','<span class="narrative-highlight">四渡夜渡全程静默行军，不许点火、不许出声。</span>身为通信员的他，草鞋早已磨穿，为避免脚步出声暴露队伍，全程光脚奔跑在摇晃的浮桥之上。','冰冷的赤水夜风刺骨，木板木刺扎破脚底，鲜血浸透桥面，他强忍剧痛往返传递口令，<span class="narrative-highlight">整夜未发一声、未出一错，稳稳衔接好全军渡河秩序。</span>','大部队成功突围、脱离险境后，没人留意这个满身伤痕的少年。','晚年李光回忆这段生死夜晚，坦言道：<span class="narrative-highlight">"那晚黑得吓人，河水冰冷，脚扎得钻心痛。但我心里清楚，我多稳一分，部队就安全一分，再疼也不能耽误突围。"</span>','无数如李光一般的红小鬼，隐于大军身后、守于危难之间。他们以少年之躯担起行军重任，默默筑牢全军突围的细微防线。'],
          en:['The Fourth Crossing — a daring breakout. The army finally escapes the 400,000-strong KMT encirclement.','Fourteen-year-old Li Guang, a "Little Red Devil," didn\'t fight on the front lines. Instead, he held his post through the entire top-secret night crossing, his young feet safeguarding the army\'s breakout moment.','<span class="narrative-highlight">The night crossing was in total silence — no lights, no sound.</span> As a messenger, his straw sandals were long gone. To avoid making noise that might expose the column, he ran barefoot across the swaying pontoon bridge all night.','The freezing Chishui wind cut to the bone. Wooden splinters pierced his soles. Blood soaked the bridge planks. He endured the agony, shuttling back and forth with verbal orders — <span class="narrative-highlight">not a single sound, not a single mistake all night, steadily maintaining the army\'s crossing order.</span>','After the main force broke free, nobody noticed this scar-covered boy.','In his later years, Li Guang recalled that life-and-death night: <span class="narrative-highlight">"It was terrifyingly dark. The river was freezing, the splinters in my feet were agonizing. But I knew — every bit steadier I was, the safer the unit would be. No matter the pain, I couldn\'t delay the breakout."</span>','Countless Little Red Devils like Li Guang, hidden behind the main force, standing firm in the hour of danger. Their young shoulders bore the weight of the march, silently building the fine defenses that made the Four Crossings breakout possible.']
        }
      },
      // 画面16 - 支线：贺子珍负伤（最终叙事）
      {
        date:{zh:'1935年4月 · 贵州某地',en:'April 1935 · Somewhere in Guizhou'},
        mapTarget:'guiyang',
        text:{
          zh:['贵州盘县，五里排，干部休养连在山沟里休息。连日急行军，贺子珍产后不足两月，身体虚弱，靠在一棵大树下闭目养神。','天边传来嗡嗡声。哨兵大喊：<span class="narrative-highlight">"敌机——！隐蔽——！"</span>贺子珍迅速滚到路边土坎下卧倒。','就在此时，她的目光扫过田坝中央——一副担架孤零零地暴露在空地上。上面躺着红三军团第十二团政委钟赤兵，他在娄山关战斗中腿部中弹截肢，此刻动弹不得。','<span class="narrative-highlight">敌机正在掉头。贺子珍没有犹豫，猛地跃起冲向担架，拼尽全力将钟赤兵向隐蔽处拖去。</span>','就在即将靠近土坎的瞬间，炸弹在她身旁炸开。硝烟散去，战友们看见贺子珍趴在担架上，军装后背被撕成碎片，鲜血浸透了土地。<span class="narrative-highlight">钟赤兵毫发无损。17块弹片嵌入了贺子珍的头部、背部、四肢。</span>','军医没有麻药，用镊子一块一块将浅表的弹片硬生生夹出。她死死咬着毛巾，没有发出一声呻吟。','苏醒后，她第一句话问：<span class="narrative-highlight">"钟赤兵怎么样了？"</span>得知伤员没事，她才松了口气："不要告诉主席，他在前线很忙。"','她从不是冲锋陷阵的战士，却在敌人俯冲的那一刻，用自己的身体为战友挡住了死亡。四渡赤水的胜利，不只是那些载入史册的大仗，还有这些无声的扑倒、沉默的托举——和一个个从未被母亲抱起的孩子。'],
          en:['Panxian, Guizhou, Wulipai. The cadres\' rest company rests in a mountain hollow. After days of forced marches, He Zizhen — less than two months postpartum — leans against a tree, eyes closed.','A buzzing from the sky. The sentry shouts: <span class="narrative-highlight">"Enemy planes! Take cover!"</span> He Zizhen quickly rolls behind a roadside embankment.','Then she sees it — a stretcher lying exposed in the open field. On it is Zhong Chibing, political commissar of the 12th Regiment, Third Army Group. His leg was amputated after being wounded at Loushan Pass. He cannot move.','<span class="narrative-highlight">The planes are turning. He Zizhen doesn\'t hesitate — she leaps up, sprints to the stretcher, and drags Zhong Chibing toward cover with all her strength.</span>','Just as they near the embankment, a bomb explodes beside her. When the smoke clears, comrades see He Zizhen collapsed on the stretcher, her uniform back shredded, blood soaking the earth. <span class="narrative-highlight">Zhong Chibing is unharmed. Seventeen shrapnel fragments are embedded in He Zizhen\'s head, back, and limbs.</span>','The military doctor has no anesthetic. Piece by piece, he pulls out the shallow fragments with forceps. She bites down on a towel. Not a single groan.','When she regains consciousness, her first words: <span class="narrative-highlight">"How is Zhong Chibing?"</span> Told he is fine, she sighs with relief: "Don\'t tell the Chairman. He\'s busy at the front."','She was never a charging soldier. Yet in the moment the enemy dove, she used her body to shield a comrade from death. The victory of the Four Crossings is not only the battles recorded in history — but also these silent falls, these wordless acts of lifting — and the children never held by their mothers.']
        }
      },
    ]
  },
];

// ===== GAME LOGIC =====
function startGame(){
  document.getElementById('start-screen').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('start-screen').style.display='none';
    document.getElementById('game-container').classList.add('active');
    if(!audioCtx)initAudio();
    if('speechSynthesis' in window){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}
    initMapOverlays();initRouteLines();showStep();
  },800);
}

function showStep(){
  stopNarr();
  const ch=chapters[state.chapter];if(!ch){endGame();return}
  const step=ch.steps[state.step];if(!step){nextChapter();return}

  document.getElementById('chapterTitle').textContent=T(ch.title.zh,ch.title.en);
  updateRes();
  updateBackBtn();

  if(step.mapTarget){advanceMap(step.mapTarget);playSFX('march')}

  const sImg=step.sceneImg||ch.sceneImg;
  const sceneImgEl=document.getElementById('sceneImg');if(sceneImgEl)sceneImgEl.src=sceneImages[sImg]||sceneImages.crossing;
  mapState.sceneVisible=false;const sp2=document.getElementById('scenePanel');if(sp2)sp2.classList.remove('show');

  const nc=document.getElementById('narrativeContent');
  const texts=T(step.text.zh,step.text.en);
  let html=`<div class="narrative-date">${T(step.date.zh,step.date.en)}</div>`;
  texts.forEach((p,i)=>{html+=`<div class="narrative-text" id="nt${i}">${p}</div>`});
  nc.innerHTML=html;
  setTimeout(()=>{document.querySelectorAll('.narrative-text').forEach((el,i)=>{setTimeout(()=>el.classList.add('visible'),i*200)})},100);
  nc.scrollTop=0;

  const dp=document.getElementById('decisionPanel');
  // 判断是否为纯叙事画面（无decision字段）或决策画面
  if(step.decision){
    // 有决策的画面：显示决策选项
    let dh=`<div class="decision-title">${T(step.decision.title.zh,step.decision.title.en)}</div><div class="choices">`;
    step.decision.choices.forEach((c,i)=>{dh+=`<button class="choice-btn" onclick="makeChoice(${i})"><span class="choice-label">${c.label}</span>${T(c.text.zh,c.text.en)}</button>`});
    dh+='</div>';
    dp.innerHTML=dh;
  }else{
    // 纯叙事画面：显示"继续"按钮
    dp.innerHTML=`<button class="choice-btn" style="margin:16px auto 0;display:block;min-width:140px" onclick="advanceStep()"><span class="choice-label">▶</span>${T('继续','Continue')}</button>`;
  }

  if(state.step===0)playSFX('chapter');

  setTimeout(()=>{const elems=texts.map((_,i)=>document.getElementById(`nt${i}`));speakNarrative(texts,elems)},1000);
}

// 纯叙事画面点击"继续"后的处理
function advanceStep(){
  stopNarr();
  // 保存纯叙事画面的快照，以便回溯
  saveSnapshot();
  updateBackBtn();
  
  state.step++;
  const ch=chapters[state.chapter];
  if(state.step>=ch.steps.length){
    nextChapter();
  }else{
    showStep();
  }
}

function makeChoice(idx){
  const ch=chapters[state.chapter];const step=ch.steps[state.step];
  const choice=step.decision.choices[idx];const out=choice.outcome;
  stopNarr();playSFX('choice');

  // Save state before applying this decision (for undo)
  saveSnapshot();
  updateBackBtn();

  state.decisions.push({chapter:state.chapter,step:state.step,choice:idx,score:out.score});
  if(out.effects.troops)state.troops=Math.max(5000,state.troops+out.effects.troops);
  if(out.effects.supply)state.supply=Math.max(10,Math.min(100,state.supply+out.effects.supply));
  if(out.effects.morale)state.morale=Math.max(10,Math.min(100,state.morale+out.effects.morale));
  state.score+=out.score;
  updateRes();

  // 地图移动由每个step的mapTarget控制，不再由choice的mapNext驱动

  if(out.score>=20)setTimeout(()=>playSFX('victory'),300);
  else if(out.score<=5)setTimeout(()=>playSFX('defeat'),300);

  document.getElementById('outcomeIcon').textContent=out.icon;
  document.getElementById('outcomeTitle').textContent=T(out.title.zh,out.title.en);
  document.getElementById('outcomeText').innerHTML=T(out.text.zh,out.text.en);

  let eh='';
  if(out.effects.troops)eh+=`<span class="outcome-effect">⚔️ ${T('兵力','Troops')} ${out.effects.troops>0?'+':''}${out.effects.troops}</span>`;
  if(out.effects.supply)eh+=`<span class="outcome-effect">📦 ${T('补给','Supply')} ${out.effects.supply>0?'+':''}${out.effects.supply}</span>`;
  if(out.effects.morale)eh+=`<span class="outcome-effect">🔥 ${T('士气','Morale')} ${out.effects.morale>0?'+':''}${out.effects.morale}</span>`;
  document.getElementById('outcomeEffects').innerHTML=eh;
  document.getElementById('outcomeOverlay').classList.add('show');

  setTimeout(()=>speakEmotional(T(out.title.zh,out.title.en)+'。'+T(out.text.zh,out.text.en).replace(/<[^>]*>/g,'')),600);
}

function closeOutcome(){
  stopNarr();document.getElementById('outcomeOverlay').classList.remove('show');

  state.step++;
  const ch=chapters[state.chapter];
  if(state.step>=ch.steps.length)nextChapter();else showStep();
}

function nextChapter(){state.chapter++;state.step=0;if(state.chapter>=chapters.length)endGame();else showStep()}

function updateRes(){
  document.getElementById('troopVal').textContent=state.troops.toLocaleString();
  document.getElementById('supplyVal').textContent=state.supply;
  document.getElementById('moraleVal').textContent=state.morale;
}

function endGame(){
  stopNarr();if(bgmAudio)bgmAudio.pause();
  document.getElementById('game-container').classList.remove('active');

  playSFX('complete');

  const max=160;const pct=state.score/max;
  let rank,title,summary;
  if(pct>=0.8){rank={zh:'🏆 战神级指挥官',en:'🏆 Legendary Commander'};title={zh:'用兵如神',en:'Master of War'};summary={zh:'你完美复刻了四渡赤水的战略精髓。蒋介石四十万大军在你面前如同棋子。毛泽东大概会说："此人与我英雄所见略同。"',en:'You perfectly recreated the Four Crossings. Four hundred thousand troops were pieces on your board. Mao might say: "This one sees as I do."'}}
  else if(pct>=0.6){rank={zh:'⭐ 优秀指挥官',en:'⭐ Distinguished Commander'};title={zh:'将才之风',en:'A General\'s Mettle'};summary={zh:'你展现了出色的军事才能，红军成功突围，只是代价比历史稍大。',en:'Excellent military talent. The Red Army breaks free, though at slightly greater cost.'}}
  else if(pct>=0.4){rank={zh:'🎖️ 合格指挥官',en:'🎖️ Competent Commander'};title={zh:'中规中矩',en:'Adequate Performance'};summary={zh:'你完成了突围但走了弯路。四渡赤水的精髓在于"动"——让敌人跟着你跑。',en:'You broke free but took detours. The essence is movement — make the enemy chase you.'}}
  else if(pct>=0.2){rank={zh:'😰 菜鸟指挥官',en:'😰 Green Commander'};title={zh:'险象环生',en:'Perilous Journey'};summary={zh:'你把红军带进一个又一个险境。建议重新学习历史再来一次。',en:'You led the army into danger after danger. Study the history and try again.'}}
  else{rank={zh:'💀 灾难级指挥官',en:'💀 Disastrous Commander'};title={zh:'兵败如山',en:'Total Defeat'};summary={zh:'你几乎犯了所有不该犯的错误，红军损失惨重。',en:'You made nearly every mistake. Catastrophic losses under your command.'}}

  document.getElementById('endTitle').textContent=T(title.zh,title.en);
  document.getElementById('endRank').textContent=T(rank.zh,rank.en);
  document.getElementById('endScore').textContent=`${T('得分','Score')}: ${state.score}/${max}  |  ${T('兵力','Troops')}: ${state.troops.toLocaleString()}  |  ${T('士气','Morale')}: ${state.morale}`;
  document.getElementById('endSummary').textContent=T(summary.zh,summary.en);
  document.getElementById('end-screen').classList.add('active');
  setTimeout(()=>{if(narrOn)speakEmotional(T(title.zh,title.en)+'。'+T(summary.zh,summary.en))},1200);
}

window.addEventListener('resize',()=>{});
</script>
